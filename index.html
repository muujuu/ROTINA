<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Casinha</title>

  <style>
    :root {
      --bg: #171425;
      --bg-2: #302b3d;
      --panel: rgba(31, 26, 47, 0.94);
      --card: rgba(255, 255, 255, 0.055);
      --text: #f7efff;
      --muted: rgba(247, 239, 255, 0.64);
      --border: rgba(255, 255, 255, 0.115);
      --primary: #b77aff;
      --primary-2: #f47bca;
      --accent: #ffc247;
      --good: #5de38f;
      --bad: #ff557b;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
      --nav-h: 76px;
      --max: 1040px;
      color-scheme: dark;
    }

    * { box-sizing: border-box; }

    [hidden] { display: none !important; }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding-bottom: calc(var(--nav-h) + 34px + env(safe-area-inset-bottom));
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 10%, color-mix(in srgb, var(--primary-2) 24%, transparent), transparent 30%),
        radial-gradient(circle at 88% 8%, color-mix(in srgb, var(--primary) 23%, transparent), transparent 31%),
        linear-gradient(135deg, var(--bg), var(--bg-2) 76%);
      overflow-x: hidden;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .shell {
      width: min(var(--max), calc(100% - 22px));
      margin: 0 auto;
    }

    .app {
      padding-top: 16px;
    }

    .top-card,
    .panel,
    .modal,
    .notice {
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .top-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px;
      border-radius: 24px;
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo,
    .avatar,
    .mini-avatar,
    .story-avatar {
      overflow: hidden;
      display: grid;
      place-items: center;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
    }

    .logo {
      width: 48px;
      height: 48px;
      flex: 0 0 48px;
      border-radius: 18px;
      font-size: 1.25rem;
      box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.035);
    }

    .logo img,
    .avatar img,
    .mini-avatar img,
    .story-avatar img,
    .goal-cover img,
    .image-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.35rem, 4vw, 1.9rem);
      line-height: 1;
      letter-spacing: -0.065em;
    }

    .status-line,
    .top-actions,
    .hero-actions,
    .reaction-row,
    .quick-comments,
    .quick-money,
    .badges,
    .done-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
    }

    .status-line {
      margin-top: 6px;
      color: var(--muted);
      font-weight: 900;
      font-size: 0.78rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--good);
      box-shadow: 0 0 18px var(--good);
    }

    .top-actions {
      justify-content: flex-end;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 38px;
      padding: 9px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.065);
      color: var(--text);
      font-weight: 1000;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn.primary {
      border-color: transparent;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 12px 28px color-mix(in srgb, var(--primary) 22%, transparent);
    }

    .btn.good {
      border-color: transparent;
      color: #10281a;
      background: var(--good);
    }

    .btn.bad {
      border-color: transparent;
      color: #fff;
      background: color-mix(in srgb, var(--bad) 82%, #211a2f);
    }

    .btn.accent {
      border-color: transparent;
      color: #2d2140;
      background: var(--accent);
    }

    .btn.small {
      min-height: 32px;
      padding: 7px 10px;
      border-radius: 12px;
      font-size: 0.76rem;
    }

    .btn.icon {
      width: 40px;
      min-width: 40px;
      padding: 0;
      font-size: 1.05rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 26px;
      padding: 5px 9px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.055);
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 1000;
      line-height: 1.1;
      white-space: nowrap;
    }

    .pill.strong {
      color: var(--text);
      background: rgba(255, 255, 255, 0.09);
    }

    .main-stack {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .panel {
      padding: 14px;
      border-radius: 24px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-title h2,
    .section-title h3 {
      margin: 0;
      letter-spacing: -0.055em;
      line-height: 1.08;
    }

    .section-title h2 {
      font-size: 1.33rem;
    }

    .section-title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-weight: 850;
      font-size: 0.83rem;
      line-height: 1.35;
    }

    .hero-mission {
      display: grid;
      gap: 12px;
      padding: 15px;
      border-radius: 22px;
      border: 1px solid color-mix(in srgb, var(--primary) 32%, transparent);
      background:
        radial-gradient(circle at top right, color-mix(in srgb, var(--primary-2) 15%, transparent), transparent 40%),
        rgba(255, 255, 255, 0.055);
    }

    .hero-mission h2 {
      margin: 0;
      font-size: clamp(1.45rem, 4vw, 2.25rem);
      letter-spacing: -0.07em;
      line-height: 1;
    }

    .hero-mission p {
      margin: 0;
      color: var(--muted);
      font-weight: 850;
      line-height: 1.4;
    }

    .notice {
      min-height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(31, 26, 47, 0.72);
      box-shadow: none;
    }

    .notice.suggestion {
      border-color: color-mix(in srgb, var(--accent) 38%, transparent);
    }

    .notice .icon {
      width: 28px;
      flex: 0 0 28px;
      text-align: center;
      font-size: 1.2rem;
    }

    .notice strong { display: block; }

    .notice p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 850;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 12px;
    }

    .grid-3,
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .stat {
      padding: 13px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--card);
    }

    .stat strong {
      display: block;
      font-size: 1.32rem;
      letter-spacing: -0.06em;
    }

    .stat span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 1000;
    }

    .list {
      display: grid;
      gap: 9px;
    }

    .mission-card,
    .story-card,
    .goal-card,
    .alarm-card {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--card);
    }

    .mission-main {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .mission-title {
      min-width: 0;
      display: grid;
      gap: 7px;
    }

    .mission-title strong {
      font-size: 1rem;
      line-height: 1.12;
      letter-spacing: -0.03em;
      word-break: break-word;
    }

    .mission-title small {
      color: var(--muted);
      font-weight: 800;
      line-height: 1.32;
    }

    .mission-actions {
      display: flex;
      gap: 7px;
      align-items: center;
      flex: 0 0 auto;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .done-row {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 1000;
    }

    .avatar {
      width: 46px;
      height: 46px;
      flex: 0 0 46px;
      border-radius: 16px;
      background: var(--c, var(--primary));
      font-size: 1.25rem;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.18);
    }

    .mini-avatar {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      font-size: 0.82rem;
      background: var(--c, var(--primary));
    }

    .empty {
      min-height: 40px;
      display: grid;
      place-items: center;
      padding: 12px;
      border: 1px dashed var(--border);
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.025);
      color: var(--muted);
      font-weight: 1000;
      text-align: center;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .segment {
      min-height: 38px;
      border-radius: 13px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.045);
      color: var(--muted);
      font-weight: 1000;
    }

    .segment.active {
      border-color: transparent;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
    }

    .story-rail,
    .mode-rail {
      display: flex;
      gap: 9px;
      overflow-x: auto;
      padding: 2px 0 10px;
      scrollbar-width: none;
    }

    .story-rail::-webkit-scrollbar,
    .mode-rail::-webkit-scrollbar {
      display: none;
    }

    .story-bubble {
      min-width: 66px;
      display: grid;
      gap: 5px;
      justify-items: center;
      color: var(--text);
      background: transparent;
      padding: 0;
      border: 0;
    }

    .story-avatar {
      width: 54px;
      height: 54px;
      border-radius: 20px;
      background: var(--c, linear-gradient(135deg, var(--primary), var(--primary-2)));
      box-shadow:
        0 0 0 3px rgba(255, 255, 255, 0.08),
        0 0 0 5px color-mix(in srgb, var(--primary) 45%, transparent);
      font-size: 1.35rem;
    }

    .story-bubble span {
      width: 64px;
      overflow: hidden;
      color: var(--muted);
      font-size: 0.69rem;
      font-weight: 1000;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .story-bubble.add .story-avatar {
      background: rgba(255, 255, 255, 0.07);
      color: var(--accent);
      border: 1px dashed var(--border);
      box-shadow: none;
    }

    .mode-chip,
    .story-filter,
    .ach-tab,
    .sound-chip {
      min-height: 32px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.055);
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 1000;
      flex: 0 0 auto;
    }

    .mode-chip.active,
    .story-filter.active,
    .ach-tab.active,
    .sound-chip.active {
      border-color: transparent;
      color: #2d2140;
      background: var(--accent);
    }

    .story-filters,
    .achievement-tabs,
    .sound-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .story-head {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .story-head strong { display: block; }

    .story-head span {
      display: block;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 850;
    }

    .story-photo-placeholder {
      min-height: 160px;
      display: grid;
      place-items: center;
      border: 1px dashed var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.035);
      color: var(--muted);
      font-weight: 1000;
      text-align: center;
      padding: 14px;
    }

    .story-photo {
      width: 100%;
      max-height: 580px;
      object-fit: cover;
      border-radius: 16px;
      display: block;
      background: rgba(255, 255, 255, 0.05);
    }

    .story-caption {
      margin: 0;
      color: var(--text);
      font-weight: 850;
      line-height: 1.45;
    }

    .reaction-btn,
    .quick-comment-btn {
      min-height: 32px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.055);
      color: var(--text);
      font-weight: 1000;
    }

    .reaction-btn.active {
      background: var(--accent);
      color: #2d2140;
      border-color: transparent;
    }

    .quick-comment-btn {
      color: var(--muted);
      font-size: 0.75rem;
    }

    .week-board {
      display: grid;
      grid-template-columns: repeat(7, minmax(122px, 1fr));
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scroll-snap-type: x proximity;
    }

    .week-day {
      min-height: 240px;
      padding: 11px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.035);
      scroll-snap-align: start;
    }

    .week-day h3 {
      margin: 0 0 9px;
      font-size: 0.94rem;
      letter-spacing: -0.03em;
    }

    .week-list {
      display: grid;
      gap: 8px;
    }

    .week-mini {
      display: grid;
      gap: 7px;
      min-height: 120px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.04);
    }

    .week-mini strong {
      font-size: 0.88rem;
      line-height: 1.08;
      word-break: break-word;
    }

    .member-grid,
    .more-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .member-card {
      display: flex;
      gap: 11px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--card);
    }

    .member-card strong {
      display: block;
      font-size: 1rem;
    }

    .member-card span {
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 1000;
    }

    .progress {
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .progress span {
      display: block;
      width: var(--w, 0%);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--primary), var(--primary-2));
    }

    .milestone-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
    }

    .milestone {
      min-height: 32px;
      display: grid;
      place-items: center;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.045);
      font-size: 0.72rem;
      font-weight: 1000;
    }

    .milestone.done {
      color: #2d2140;
      background: var(--accent);
      border-color: transparent;
    }

    .goal-head {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 11px;
      align-items: center;
    }

    .goal-cover {
      width: 90px;
      height: 90px;
      overflow: hidden;
      display: grid;
      place-items: center;
      border-radius: 20px;
      border: 1px solid var(--border);
      background:
        radial-gradient(circle at top right, color-mix(in srgb, var(--primary-2) 25%, transparent), transparent 42%),
        rgba(255, 255, 255, 0.05);
      color: var(--muted);
      font-size: 2rem;
      font-weight: 1000;
    }

    .deposit-list {
      display: grid;
      gap: 8px;
      max-height: 220px;
      overflow: auto;
      padding-right: 2px;
    }

    .deposit-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.035);
      font-weight: 1000;
    }

    .deposit-item span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 850;
    }

    .history-list {
      display: grid;
      gap: 9px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.045);
      font-weight: 1000;
    }

    .history-item span {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .achievement-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px;
    }

    .achievement {
      min-height: 92px;
      display: grid;
      place-items: center;
      gap: 7px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 17px;
      background: rgba(255, 255, 255, 0.035);
      text-align: center;
      font-weight: 1000;
    }

    .achievement .big {
      font-size: 1.45rem;
      opacity: 0.55;
      filter: grayscale(1);
    }

    .achievement.unlocked {
      border-color: color-mix(in srgb, var(--primary) 40%, transparent);
      background: rgba(255, 255, 255, 0.06);
    }

    .achievement.unlocked .big {
      opacity: 1;
      filter: none;
    }

    .more-card {
      min-height: 74px;
      display: grid;
      align-content: center;
      gap: 3px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--card);
      color: var(--text);
      text-align: left;
    }

    .more-card strong {
      font-size: 0.98rem;
    }

    .more-card span {
      display: none;
    }

    .template-section {
      display: grid;
      gap: 9px;
    }

    .template-title {
      margin: 10px 0 2px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 9px;
    }

    .template-card {
      min-height: 108px;
      display: grid;
      align-content: space-between;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 17px;
      background: rgba(255, 255, 255, 0.045);
      color: var(--text);
      text-align: left;
    }

    .template-card strong {
      font-size: 0.95rem;
      line-height: 1.14;
    }

    .template-card span {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 850;
      line-height: 1.3;
    }

    .alarm-main {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .alarm-time {
      font-size: 2rem;
      line-height: 1;
      letter-spacing: -0.07em;
      font-weight: 1000;
    }

    .alarm-name {
      display: grid;
      gap: 5px;
    }

    .alarm-name strong {
      font-size: 1rem;
    }

    .alarm-name span {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .alarm-card.off {
      opacity: 0.62;
    }

    .ring-card {
      display: grid;
      gap: 14px;
      padding: 18px;
      border-radius: 24px;
      background:
        radial-gradient(circle at top right, color-mix(in srgb, var(--accent) 30%, transparent), transparent 40%),
        rgba(255, 255, 255, 0.06);
      border: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
    }

    .ring-card h2 {
      margin: 0;
      font-size: clamp(2rem, 9vw, 4rem);
      letter-spacing: -0.08em;
      line-height: 0.9;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 50;
      width: min(680px, calc(100% - 18px));
      min-height: var(--nav-h);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
      padding: 7px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: rgba(25, 21, 38, 0.88);
      box-shadow: 0 14px 44px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(20px);
      transform: translateX(-50%);
    }

    .nav-btn {
      display: grid;
      place-items: center;

    function escapeHTML(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function clamp(value, min, max) {
      const number = Number(value);
      if (Number.isNaN(number)) return min;
      return Math.max(min, Math.min(max, number));

      date.setDate(date.getDate() + offset);
      date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
      return date.toISOString().slice(0, 10);
    }

      const copy = new Date(date);
      copy.setMinutes(copy.getMinutes() - copy.getTimezoneOffset());
      return copy.toISOString().slice(0, 10);

      const [year, month, day] = String(key).split("-").map(Number);
      return new Date(year, month - 1, day, 12);

      return fromKey(key).toLocaleDateString("pt-BR", { weekday: "short", day: "2-digit", month: "2-digit" });

      return now;
    }

      const diff = Date.now() - Number(timestamp || Date.now());
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(minutes / 60);
      const days = Math.floor(hours / 24);
      if (minutes < 1) return "agora";
      if (minutes < 60) return `${minutes}min`;
      if (hours < 24) return `${hours}h`;
      return `${days}d`;
    }

      if (mode === "google") photo = person?.googlePhotoURL || person?.photoURL || "";
      if (photo) {
        return `<div class="${className}" style="--c:${escapeHTML(person.color || "#b77aff")}"><img src="${escapeHTML(photo)}" alt=""></div>`;
      }
      return `<div class="${className}" style="--c:${escapeHTML(person?.color || "#b77aff")}">${escapeHTML(person?.emoji || "👤")}</div>`;
    }

    function categoryOf(key) {
      return CATEGORIES[key] || CATEGORIES.casa;
    }

    function xpByMinutes(minutes) {
      const value = Number(minutes || 5);
      if (value <= 5) return 8;
      if (value <= 15) return 12;
      if (value <= 30) return 22;
      if (value <= 60) return 38;
      return 55;
    }

    function energyNumber(value) {
      if (value === "leve") return 1;
      if (value === "media") return 3;
      if (value === "pesada") return 5;
      return clamp(value || 1, 1, 5);
    }

    function energyLabel(value) {
      const number = Number(value || 1);
      if (number <= 1) return "leve";
      if (number <= 3) return "média";
      return "pesada";
    }

    function randomRoomCode() {
      const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let code = "";
      for (let i = 0; i < 6; i += 1) code += chars[Math.floor(Math.random() * chars.length)];
      return code;
    }

    function normalizeRoomCode(value) {
      return String(value || "").toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 6);
    }

    function makeId(prefix) {
      return `${prefix}_${crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}_${Math.random().toString(16).slice(2)}`}`;
    }

    function createMission(partial = {}) {

        assigned: partial.assigned || "any",
        createdAt: partial.createdAt || Date.now(),
        done: partial.done || {},
        skipped: partial.skipped || {}
      };
    }

    function createGoal(partial = {}) {

          createMission({ title: "Check-in carinhoso", description: "Perguntar como o outro está.", category: "relacionamento", frequency: "daily", minutes: 3, xp: 12, energy: 1, assigned: "both" })

    function ensureDataShape(input) {
      const fallback = defaultData(input?.roomId || state.roomId || "LOCAL");
      const data = {
        ...fallback,
        ...(input || {}),
        settings: { ...fallback.settings, ...(input?.settings || {}) },
        systems: {
          pets: { ...fallback.systems.pets, ...(input?.systems?.pets || input?.pets || {}) },
          casa: { ...fallback.systems.casa, ...(input?.systems?.casa || {}) }
        },
        wallet: {

        },
        alarms: Array.isArray(input?.alarms) ? input.alarms.map(createAlarm) : [],
        members: input?.members || fallback.members,
        missions: Array.isArray(input?.missions)
          ? input.missions.map((mission) => ({

          photoURL: data.members[state.uid].photoURL || googleProfile.photoURL,

    function getSelectedFile(form, name = "photo") {
      const input = form.querySelector(`input[name="${name}"][type="file"]`);
      return input?.files?.[0] || null;
    }

    function assertImageFile(file) {
      if (!file) return;
      if (!file.type.startsWith("image/")) throw new Error("Escolha uma imagem válida.");
      if (file.size > 12 * 1024 * 1024) throw new Error("Use uma foto de até 12 MB.");
    }

    function loadImageFromFile(file) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const image = new Image();
        image.onload = () => {
          URL.revokeObjectURL(url);
          resolve(image);
        };
        image.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error("Não foi possível ler a imagem."));
        };
        image.src = url;
      });
    }

    function estimateDataUrlBytes(dataUrl) {
      const base64 = String(dataUrl).split(",")[1] || "";
      return Math.round((base64.length * 3) / 4);
    }

    async function compressImageToDataUrl(file, options = {}) {
      assertImageFile(file);
      const { maxSide = 850, quality = 0.66, square = false, maxChars = 720000 } = options;
      const image = await loadImageFromFile(file);
      let currentMaxSide = maxSide;
      let currentQuality = quality;

      for (let attempt = 0; attempt < 10; attempt += 1) {
        let sourceX = 0;
        let sourceY = 0;
        let sourceWidth = image.naturalWidth || image.width;
        let sourceHeight = image.naturalHeight || image.height;

        if (square) {
          const side = Math.min(sourceWidth, sourceHeight);
          sourceX = Math.floor((sourceWidth - side) / 2);
          sourceY = Math.floor((sourceHeight - side) / 2);
          sourceWidth = side;
          sourceHeight = side;
        }

        const scale = Math.min(1, currentMaxSide / Math.max(sourceWidth, sourceHeight));
        const outputWidth = Math.max(1, Math.round(sourceWidth * scale));
        const outputHeight = Math.max(1, Math.round(sourceHeight * scale));
        const canvas = document.createElement("canvas");
        canvas.width = outputWidth;
        canvas.height = outputHeight;

        const context = canvas.getContext("2d", { alpha: false });
        context.fillStyle = "#111";
        context.fillRect(0, 0, outputWidth, outputHeight);
        context.imageSmoothingEnabled = true;
        context.imageSmoothingQuality = "high";
        context.drawImage(image, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, outputWidth, outputHeight);

        const dataUrl = canvas.toDataURL("image/jpeg", currentQuality);
        if (dataUrl.length <= maxChars) {
          return { dataUrl, width: outputWidth, height: outputHeight, bytes: estimateDataUrlBytes(dataUrl) };
        }

        currentMaxSide = Math.max(420, Math.floor(currentMaxSide * 0.86));
        currentQuality = Math.max(0.42, currentQuality - 0.06);
      }

      throw new Error("Não consegui comprimir a foto. Tente uma menor.");
    }

    async function compressProfilePhoto(file) {
      return compressImageToDataUrl(file, { maxSide: 320, quality: 0.72, square: true, maxChars: 190000 });
    }

    async function compressStoryPhoto(file) {
      return compressImageToDataUrl(file, { maxSide: 850, quality: 0.66, square: false, maxChars: 720000 });
    }

    async function compressGoalCoverPhoto(file) {
      return compressImageToDataUrl(file, { maxSide: 720, quality: 0.66, square: false, maxChars: 360000 });
    }

    function storyDocRef(storyId) {
      return doc(state.db, COLLECTION, state.roomId, "stories", storyId);
    }

    function subscribeStories(roomId) {
      if (state.storiesRoomId === roomId && state.unsubscribeStories) return;

      if (state.unsubscribeStories) {
        state.unsubscribeStories();
        state.unsubscribeStories = null;
      }

      state.storiesRoomId = roomId;

      const storiesQuery = query(collection(state.db, COLLECTION, roomId, "stories"), orderBy("createdAt", "desc"), limit(40));

      state.unsubscribeStories = onSnapshot(
        storiesQuery,
        (snapshot) => {
          state.stories = snapshot.docs.map((item) => createStory({ id: item.id, ...item.data() }));
          render();
        },
        (error) => {
          console.error(error);
          toast("Erro ao carregar Stories.");
        }
      );
    }

    function renderLocalImagePreview(input) {
      const previewId = input.dataset.preview;
      const preview = document.getElementById(previewId);
      const file = input.files?.[0];
      if (!preview || !file) return;
      if (!file.type.startsWith("image/")) {
        preview.innerHTML = "Escolha uma imagem válida.";
        return;
      }
      const url = URL.createObjectURL(file);
      preview.innerHTML = `<img src="${url}" alt="">`;
      const img = preview.querySelector("img");
      img.onload = () => URL.revokeObjectURL(url);
    }

    async function updateData(mutator) {
      if (!state.cloudReady || !state.roomId) throw new Error("A Casinha ainda não está sincronizada.");
      const ref = doc(state.db, COLLECTION, state.roomId);

      await runTransaction(state.db, async (transaction) => {
        const snapshot = await transaction.get(ref);
        const current = ensureDataShape(snapshot.exists() ? snapshot.data() : defaultData(state.roomId));
        mutator(current);
        current.updatedAt = Date.now();
        transaction.set(ref, current);
      });
    }

    function applyTheme() {
      const settings = state.data?.settings || {};
      const theme = settings.custom || THEMES[settings.theme] || THEMES.familia;
      const root = document.documentElement;
      root.style.setProperty("--bg", theme.bg);
      root.style.setProperty("--bg-2", theme.bg2 || "#302b3d");
      root.style.setProperty("--panel", theme.panel);
      root.style.setProperty("--primary", theme.primary);
      root.style.setProperty("--primary-2", theme.primary2);
      root.style.setProperty("--accent", theme.accent);
      root.style.setProperty("--text", theme.text);
    }

    async function initFirebase() {
      renderLoading();
      state.app = initializeApp(firebaseConfig);
      state.auth = getAuth(state.app);
      state.db = getFirestore(state.app);

      onAuthStateChanged(state.auth, async (user) => {
        if (!user) {
          state.user = null;
          state.uid = "";
          state.cloudReady = false;
          state.data = null;
          state.stories = [];
          state.storiesRoomId = "";

          if (state.unsubscribe) state.unsubscribe();
          if (state.unsubscribeStories) state.unsubscribeStories();

          state.unsubscribe = null;
          state.unsubscribeStories = null;

          renderLogin();
          return;
        }

        state.user = user;
        state.uid = user.uid;

        const urlRoom = normalizeRoomCode(new URLSearchParams(location.search).get("room"));
        const savedRoom = normalizeRoomCode(localStorage.getItem(STORAGE.room));

        if (urlRoom) {
          await joinRoom(urlRoom, true);
          return;
        }

        if (savedRoom) {
          subscribeRoom(savedRoom, true);
          return;
        }

        await createRoom(true);
      });
    }

    async function signInGoogle() {
      const provider = new GoogleAuthProvider();
      provider.setCustomParameters({ prompt: "select_account" });
      await signInWithPopup(state.auth, provider);
    }

    async function logout() {
      if (state.unsubscribe) state.unsubscribe();
      if (state.unsubscribeStories) state.unsubscribeStories();

      state.unsubscribe = null;
      state.unsubscribeStories = null;
      state.stories = [];
      state.storiesRoomId = "";

      localStorage.removeItem(STORAGE.room);
      await signOut(state.auth);
      toast("Você saiu.");
    }

    async function createRoom(silent = false) {
      const roomId = randomRoomCode();
      const profile = { ...googleProfileFromUser(), joinedAt: Date.now() };
      const data = defaultData(roomId);
      data.members = { [state.uid]: profile };

      await setDoc(doc(state.db, COLLECTION, roomId), data);

      state.roomId = roomId;
      state.cloudReady = true;
      localStorage.setItem(STORAGE.room, roomId);
      subscribeRoom(roomId, false);

      if (!silent) toast(`Sala ${roomId} criada.`);
    }

    async function joinRoom(roomId, silent = false) {
      const code = normalizeRoomCode(roomId);
      if (code.length !== 6) {
        toast("Código inválido.");
        return;
      }

      const profile = { ...googleProfileFromUser(), joinedAt: Date.now() };

      await setDoc(doc(state.db, COLLECTION, code), {
        roomId: code,
        members: { [state.uid]: profile },
        updatedAt: Date.now()
      }, { merge: true });

      state.roomId = code;
      state.cloudReady = true;
      localStorage.setItem(STORAGE.room, code);
      subscribeRoom(code, false);

      if (!silent) toast(`Entrou na sala ${code}.`);
    }

    function subscribeRoom(roomId, fallbackCreate = false) {
      if (state.unsubscribe) state.unsubscribe();

      state.roomId = roomId;
      state.cloudReady = true;

      state.unsubscribe = onSnapshot(
        doc(state.db, COLLECTION, roomId),
        async (snapshot) => {
          if (!snapshot.exists()) {
            if (fallbackCreate) {
              localStorage.removeItem(STORAGE.room);
              await createRoom(true);
              return;
            }
            toast("Sala não encontrada.");
            return;
          }

          state.data = ensureDataShape(snapshot.data());
          applyTheme();
          subscribeStories(roomId);
          startAlarmLoop();
          render();
        },
        async (error) => {
          console.error(error);
          if (fallbackCreate) {
            localStorage.removeItem(STORAGE.room);
            await createRoom(true);
            return;
          }
          toast("Erro ao sincronizar.");
        }
      );
    }

    function members() {
      return Object.values(state.data?.members || {});
    }

    function me() {
      return state.data?.members?.[state.uid] || googleProfileFromUser();
    }

    function missionStartKey(mission) {
      return dateKey(new Date(mission.createdAt || Date.now()));
    }

    function isDueOn(mission, key) {
      if (key < missionStartKey(mission)) return false;
      const date = fromKey(key);
      const day = date.getDay();

      if (mission.frequency === "daily") return true;
      if (mission.frequency === "weekly") return (mission.days || []).map(Number).includes(day);
      if (mission.frequency === "monthly") return date.getDate() === Number(mission.monthDay || 1);
      return mission.date === key;
    }

    function isSkipped(mission, key) {
      return Boolean(mission.skipped?.[key]);
    }

    function doneMap(mission, key) {
      return mission.done?.[key] || {};
    }

    function doneByMe(mission, key = todayKey()) {
      return Boolean(doneMap(mission, key)[state.uid]);
    }

    function doneMembers(mission, key = todayKey()) {
      const map = doneMap(mission, key);
      return members().filter((person) => map[person.uid]);
    }

    function missingPeople(mission, key) {
      if (mission.assigned !== "both") return [];
      const map = doneMap(mission, key);
      return members().filter((person) => !map[person.uid]);
    }

    function baseComplete(mission, key = todayKey()) {
      if (isSkipped(mission, key)) return true;
      const map = doneMap(mission, key);

      if (mission.assigned === "both" && members().length > 1) {
        return members().every((person) => Boolean(map[person.uid]));
      }

      return Object.values(map).some(Boolean);
    }

    function dueDatesForMission(mission, back = 45, forward = 0) {
      const dates = [];

      for (let offset = -back; offset <= forward; offset += 1) {
        const key = todayKey(offset);
        if (isDueOn(mission, key) && !isSkipped(mission, key)) dates.push(key);
      }

      return dates;
    }

    function missionsDueToday() {
      return state.data.missions.filter((mission) => isDueOn(mission, todayKey()) && !isSkipped(mission, todayKey()));
    }

    function missionsByFrequency(frequency) {
      return state.data.missions.filter((mission) => mission.frequency === frequency);
    }

    function smartSortedMissions(list) {
      return [...list].sort((a, b) => {
        const energy = Number(a.energy || 1) - Number(b.energy || 1);
        if (energy !== 0) return energy;
        const minutes = Number(a.minutes || 5) - Number(b.minutes || 5);
        if (minutes !== 0) return minutes;
        return String(a.title).localeCompare(String(b.title), "pt-BR");
      });
    }

    function overdueItems() {
      const items = [];

      for (const mission of state.data.missions) {
        for (const key of dueDatesForMission(mission, 45, -1)) {
          if (!baseComplete(mission, key)) items.push({ mission, key });
        }
      }

      return items.sort((a, b) => {
        const energy = Number(a.mission.energy || 1) - Number(b.mission.energy || 1);
        if (energy !== 0) return energy;
        const minutes = Number(a.mission.minutes || 5) - Number(b.mission.minutes || 5);
        if (minutes !== 0) return minutes;
        return a.key.localeCompare(b.key);
      });
    }

    function systemPriority(category) {
      if (category === "pets") return 100 - systemHealth("pets");
      if (category === "casa") return 100 - systemHealth("casa");
      return 0;
    }

    function suggestedMission() {
      const overdue = overdueItems();

      if (overdue.length) {
        return { ...overdue[0], reason: "Recomeço sugerido." };
      }

      const today = todayKey();
      const todayPending = visibleTodayMissions().sort((a, b) => {
        const systemA = systemPriority(a.category);
        const systemB = systemPriority(b.category);
        if (systemA !== systemB) return systemB - systemA;
        const energy = Number(a.energy || 1) - Number(b.energy || 1);
        if (energy !== 0) return energy;
        return Number(a.minutes || 5) - Number(b.minutes || 5);
      })[0];

      if (todayPending) {
        return { mission: todayPending, key: today, reason: `Modo ${smartModeLabel()}.` };
      }

      for (let offset = 1; offset <= 31; offset += 1) {
        const key = todayKey(offset);
        const found = state.data.missions.find((mission) => isDueOn(mission, key) && !isSkipped(mission, key));
        if (found) return { mission: found, key, reason: "Próxima missão." };
      }

      return null;
    }

    function nextKeyForMission(mission) {
      for (let offset = 0; offset <= 40; offset += 1) {
        const key = todayKey(offset);
        if (isDueOn(mission, key) && !isSkipped(mission, key)) return key;
      }
      return mission.date || todayKey();
    }

    function completedEvents() {
      const events = [];

      for (const mission of state.data.missions) {
        for (const [key, map] of Object.entries(mission.done || {})) {
          for (const [uid, value] of Object.entries(map || {})) {
            if (value) {
              events.push({ type: "mission", mission, key, uid, at: typeof value === "number" ? value : Date.now() });
            }
          }
        }
      }

      return events;
    }

    function scoreFor(uid) {
      return completedEvents()
        .filter((event) => event.uid === uid)
        .reduce((sum, event) => sum + Number(event.mission.xp || 0), 0);
    }

    function categoryDoneCount(category) {
      return completedEvents().filter((event) => event.mission.category === category).length;
    }

    function minutesDone() {
      return completedEvents().reduce((sum, event) => sum + Number(event.mission.minutes || 0), 0);
    }

    function walletSaved() {
      return (state.data.wallet.goals || []).reduce((sum, goal) => sum + Number(goal.saved || 0), 0);
    }

    function walletTarget() {
      return (state.data.wallet.goals || []).reduce((sum, goal) => sum + Number(goal.target || 0), 0);
    }

    function isGoalCompleted(goal) {
      return Number(goal.saved || 0) >= Number(goal.target || 1);
    }

    function completedGoalsCount() {
      return (state.data.wallet.goals || []).filter((goal) => isGoalCompleted(goal)).length;
    }

    function storiesPosted() {
      return state.stories.length;
    }

    function memoriesSaved() {
      return state.stories.filter((story) => story.savedToMemories).length;
    }

    function perfectDayCount() {
      let count = 0;

      for (let offset = 0; offset >= -120; offset -= 1) {
        const key = todayKey(offset);
        const due = state.data.missions.filter((mission) => isDueOn(mission, key) && !isSkipped(mission, key));
        if (due.length && due.every((mission) => baseComplete(mission, key))) count += 1;
      }

      return count;
    }

    function currentStreak() {
      let streak = 0;

      for (let offset = 0; offset >= -90; offset -= 1) {
        const key = todayKey(offset);
        const due = state.data.missions.filter((mission) => isDueOn(mission, key) && !isSkipped(mission, key));
        if (!due.length || !due.every((mission) => baseComplete(mission, key))) break;
        streak += 1;
      }

      return streak;
    }

    function metrics() {
      const events = completedEvents();
      return {
        missionsDone: events.length,
        perfectDays: perfectDayCount(),
        petsDone: categoryDoneCount("pets"),
        casaDone: categoryDoneCount("casa"),
        financeiroDone: categoryDoneCount("financeiro"),
        relacionamentoDone: categoryDoneCount("relacionamento"),

    function ensureAudioContext() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) throw new Error("Seu navegador não suporta áudio do alarme.");
      if (!alarmRuntime.audioContext) alarmRuntime.audioContext = new AudioContextClass();
      return alarmRuntime.audioContext;
    }

    async function unlockAudio() {
      const context = ensureAudioContext();
      if (context.state === "suspended") await context.resume();
      return context;
    }

    function playTone(context, frequency, duration, type, startTime, volume = 0.12) {
      if (!frequency) return;

      const oscillator = context.createOscillator();
      const gain = context.createGain();

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, startTime);

      gain.gain.setValueAtTime(0.0001, startTime);
      gain.gain.exponentialRampToValueAtTime(volume, startTime + 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

      oscillator.connect(gain);
      gain.connect(context.destination);

      oscillator.start(startTime);
      oscillator.stop(startTime + duration + 0.025);
    }

    async function playAlarmSound(soundKey = "home") {
      const sound = ALARM_SOUNDS[soundKey] || ALARM_SOUNDS.home;
      const context = await unlockAudio();
      let cursor = context.currentTime + 0.03;

      for (const [frequency, duration] of sound.notes) {
        if (frequency) playTone(context, frequency, duration, sound.type, cursor);
        cursor += duration + sound.gap;
      }
    }

    async function requestAlarmPermission() {
      try {
        await unlockAudio();
        await playAlarmSound("home");

        if ("Notification" in window && Notification.permission === "default") {
          const permission = await Notification.requestPermission();
          if (permission !== "granted") {
            toast("Som ativado. Notificação não liberada.");
          }
        }

        state.alarmsReady = true;
        localStorage.setItem(STORAGE.alarmsReady, "1");
        startAlarmLoop();
        render();
        toast("Alarmes ativados.");
      } catch (error) {
        console.error(error);
        toast(error.message || "Não foi possível ativar alarmes.");
      }
    }

    function startAlarmLoop() {
      if (alarmRuntime.timer) return;
      alarmRuntime.timer = setInterval(checkAlarms, 15000);
      checkAlarms();
    }

    function checkAlarms() {
      if (!state.alarmsReady || !state.data?.alarms?.length) return;

      const now = new Date();
      const hhmm = `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
      const day = now.getDay();
      const today = dateKey(now);

      for (const alarm of state.data.alarms) {
        if (!alarm.enabled) continue;
        if (alarm.time !== hhmm) continue;
        if (alarm.days?.length && !alarm.days.map(Number).includes(day)) continue;

        const ringKey = `${alarm.id}_${today}_${hhmm}`;
        if (alarmRuntime.rungKeys.has(ringKey)) continue;

        alarmRuntime.rungKeys.add(ringKey);
        triggerAlarm(alarm, ringKey);
      }

      if (alarmRuntime.rungKeys.size > 300) alarmRuntime.rungKeys.clear();
    }

    async function triggerAlarm(alarm, ringKey) {
      alarmRuntime.currentRingId = ringKey;

      try {
        await playAlarmSound(alarm.sound);
      } catch (error) {
        console.error(error);
      }

      notifyAlarm(alarm);
      if (navigator.vibrate) navigator.vibrate([220, 90, 220, 90, 320]);

      let repeats = 0;
      clearInterval(alarmRuntime.ringTimer);
      alarmRuntime.ringTimer = setInterval(async () => {
        if (alarmRuntime.currentRingId !== ringKey) return;
        repeats += 1;
        if (repeats >= 12) {
          stopAlarm();
          return;
        }
        try {
          await playAlarmSound(alarm.sound);
          if (navigator.vibrate) navigator.vibrate([180, 80, 180]);
        } catch (error) {
          console.error(error);
        }
      }, 1700);

      openAlarmRingingModal(alarm);
    }

    function notifyAlarm(alarm) {
      if (!("Notification" in window)) return;
      if (Notification.permission !== "granted") return;

      const notification = new Notification(`⏰ ${alarm.title}`, {
        body: `Alarme da Casinha • ${alarm.time}`,
        icon: APP_ICON,
        badge: APP_ICON,
        tag: `casinha-alarm-${alarm.id}`,
        renotify: true
      });

      notification.onclick = () => {
        window.focus();
        notification.close();
      };
    }

    function stopAlarm() {
      alarmRuntime.currentRingId = "";
      clearInterval(alarmRuntime.ringTimer);
      alarmRuntime.ringTimer = null;
      if (navigator.vibrate) navigator.vibrate(0);
      closeModal();
      toast("Alarme parado.");
    }

        title: template.title,

        category: template.category,
        frequency: template.frequency,
        days: Array.isArray(template.days) ? template.days : [new Date().getDay()],
        date: todayKey(),
        minutes: template.minutes,
        xp: xpByMinutes(template.minutes),
        energy: template.energy,
        assigned: template.assigned

      await updateData((data) => {
        data.missions.push(mission);
        data.history ||= [];
        data.history.push({ type: "templateMission", missionId: mission.id, title: mission.title, uid: state.uid, byName: me().name, templateId, createdAt: Date.now() });

      toast(`Missão criada: ${template.title}`);

    function renderWeeklyBoard() {
      const start = startOfWeekMonday();

      const columns = WEEK_ORDER.map((dayIndex, orderIndex) => {
        const date = new Date(start);
        date.setDate(start.getDate() + orderIndex);
        const key = dateKey(date);
        const missions = state.data.missions.filter((mission) => mission.frequency === "weekly" && isDueOn(mission, key));

        return `
          <div class="week-day">
            <h3>${DAY_NAMES[dayIndex]}</h3>
            <div class="week-list">
              ${missions.length ? missions.map((mission) => renderWeekMiniCard(mission, key)).join("") : `<div class="empty">—</div>`}
            </div>
          </div>
        `;
      }).join("");

      return `<div class="week-board">${columns}</div>`;
    }

      const cat = categoryOf(mission.category);
      return `

          <div class="badges"><span class="pill">${mission.minutes} min</span><span class="pill">${mission.xp} XP</span></div>

    function renderMissionCard(mission, key = todayKey(), compact = false) {
      const cat = categoryOf(mission.category);
      const done = doneByMe(mission, key);
      const people = doneMembers(mission, key);
      const missing = missingPeople(mission, key);
      const isOverdue = key < todayKey() && !baseComplete(mission, key);

      return `
        <article class="mission-card">
          <div class="mission-main">
            <div class="mission-title">
              <strong>${cat.icon} ${escapeHTML(mission.title)}</strong>
              <div class="badges">

                <span class="pill">${mission.assigned === "both" ? "os dois" : "qualquer um"}</span>
                <span class="pill">${mission.minutes} min</span>
                <span class="pill">${mission.xp} XP</span>
                <span class="pill">${isOverdue ? "recomeço" : formatDate(key)}</span>
              </div>
              ${!compact && mission.description ? `<small>${escapeHTML(mission.description)}</small>` : ""}
            </div>

            <div class="mission-actions">
              <button class="btn small good" data-action="toggle-done" data-id="${escapeHTML(mission.id)}" data-date="${escapeHTML(key)}" type="button">${done ? "Feita" : "Feita"}</button>

      return `
        <article class="goal-card">
          <div class="goal-head">
            <div class="goal-cover">${goal.coverData ? `<img src="${escapeHTML(goal.coverData)}" alt="">` : "🐷"}</div>

              <strong>${completed ? "🏁" : "🐷"} ${escapeHTML(goal.title)}</strong>
              <div class="badges">
                <span class="pill">${money(goal.saved)}</span>
                <span class="pill">${money(goal.target)}</span>

          </div>

          <div class="progress"><span style="--w:${percent}%"></span></div>

          <div class="milestone-row">

              ${deposits.slice(0, 12).map((deposit) => `
                <div class="deposit-item">

      const missionEvents = completedEvents().map((event) => {

        return {
          at: event.at,
          html: `

              <strong>+${event.mission.xp}</strong>
            </div>
          `
        };
      });

      const walletEvents = (state.data.wallet.deposits || []).map((deposit) => ({
        at: deposit.createdAt || Date.now(),
        html: `
          <div class="history-item">
            <div>🐷 ${escapeHTML(deposit.description || "Depósito")}<br><span>${escapeHTML(deposit.byName || "Pessoa")} • ${formatDate(deposit.date || todayKey())}</span></div>

      }));

      const storyEvents = state.stories.map((story) => ({
        at: story.createdAt || Date.now(),
        html: `
          <div class="history-item">
            <div>📸 ${story.type === "mission" ? `Story de ${escapeHTML(story.missionTitle)}` : "Story"}<br><span>${escapeHTML(story.authorName || "Pessoa")} • ${timeAgo(story.createdAt)}</span></div>

    async function toggleDone(missionId, key) {
      const missionBefore = state.data.missions.find((item) => item.id === missionId);
      const willMarkDone = missionBefore && !doneByMe(missionBefore, key);

      await updateData((data) => {
        const mission = data.missions.find((item) => item.id === missionId);
        if (!mission) return;

        mission.done ||= {};
        mission.done[key] ||= {};

        const wasDone = Boolean(mission.done[key][state.uid]);

        if (wasDone) {
          delete mission.done[key][state.uid];
        } else {
          mission.done[key][state.uid] = Date.now();

          data.history ||= [];
          data.history.push({
            type: "mission",
            missionId,
            title: mission.title,
            category: mission.category,
            uid: state.uid,
            byName: me().name,
            date: key,
            xp: mission.xp,
            createdAt: Date.now()
          });

          if (mission.category === "pets") {
            data.systems.pets.health = clamp((data.systems.pets.health || 0) + 12, 0, 100);
            data.systems.pets.mood = data.systems.pets.health >= 70 ? "feliz" : "melhorando";
            data.systems.pets.lastCare = Date.now();
          }

          if (mission.category === "casa") {
            data.systems.casa.health = clamp((data.systems.casa.health || 0) + 10, 0, 100);
            data.systems.casa.mood = data.systems.casa.health >= 70 ? "em ordem" : "melhorando";
            data.systems.casa.lastCare = Date.now();
          }
        }

        if (mission.done[key] && Object.keys(mission.done[key]).length === 0) delete mission.done[key];
      });

      closeModal();

      if (willMarkDone && missionBefore) {
        openAfterDoneStoryPrompt(missionBefore, key);
      } else {
        toast("Atualizado.");
      }
    }

    async function skipDay(missionId, key) {

        mission.skipped ||= {};
        mission.skipped[key] = { by: state.uid, byName: me().name, at: Date.now() };

        data.history ||= [];
        data.history.push({ type: "skip", missionId, title: mission.title, uid: state.uid, byName: me().name, date: key, createdAt: Date.now() });
      });

      closeModal();

        mission.skipped[key] = { by: state.uid, byName: me().name, at: Date.now(), reason: "fazer depois" };

        }));
      });

      await updateData((data) => {

        mission.skipped ||= {};
        mission.skipped[oldKey] = { by: state.uid, byName: me().name, at: Date.now(), reason: "reagendado" };

        data.missions.push(createMission({

          xp: mission.xp,

        }));

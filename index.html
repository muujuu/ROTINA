    }

    async function saveQuickMission(form) {
      const formData = new FormData(form);
      const title = String(formData.get("title") || "").trim().slice(0, 70);
      const frequency = String(formData.get("frequency") || "daily");
      const minutes = clamp(formData.get("minutes"), 1, 600);
      const days = formData.getAll("days").map(Number);

      if (!title) {
        toast("Dê um nome.");
        return;
      }

      const mission = createMission({
        title,
        frequency,
        minutes,
        xp: xpByMinutes(minutes),
        category: String(formData.get("category") || "casa"),
        energy: energyNumber(formData.get("energy") || "leve"),
        assigned: String(formData.get("assigned") || "any"),
        days: days.length ? days : [new Date().getDay()],
        date: todayKey()
      });

      await updateData((data) => {
        data.missions.push(mission);
      });

      closeModal();
      toast("Missão criada.");
    }

    async function saveMission(form) {
      const formData = new FormData(form);
      const id = form.dataset.id;
      const days = formData.getAll("days").map(Number);
      const minutes = clamp(formData.get("minutes"), 1, 600);

      const payload = {
        title: String(formData.get("title") || "").trim().slice(0, 70),
        description: String(formData.get("description") || "").trim().slice(0, 260),
        category: String(formData.get("category") || "casa"),
        frequency: String(formData.get("frequency") || "daily"),
        days: days.length ? days : [new Date().getDay()],
        monthDay: clamp(formData.get("monthDay"), 1, 31),
        date: String(formData.get("date") || todayKey()),
        assigned: String(formData.get("assigned") || "any"),
        minutes,
        xp: clamp(formData.get("xp") || xpByMinutes(minutes), 1, 200),
        energy: energyNumber(formData.get("energy") || "leve")
      };

      if (!payload.title) {
        toast("Dê um título.");
        return;
      }

      await updateData((data) => {
        const mission = data.missions.find((item) => item.id === id);
        if (!mission) return;
        Object.assign(mission, payload);
      });

      closeModal();
      toast("Missão salva.");
    }

    async function deleteMission(id) {
      const ok = confirm("Excluir missão?");
      if (!ok) return;

      await updateData((data) => {
        data.missions = data.missions.filter((mission) => mission.id !== id);
      });

      closeModal();
      toast("Missão excluída.");
    }

    async function saveAlarm(form) {
      const formData = new FormData(form);
      const id = form.dataset.id;
      const title = String(formData.get("title") || "Alarme da Casinha").trim().slice(0, 60);
      const time = String(formData.get("time") || "08:00");
      const days = formData.getAll("days").map(Number);
      const sound = String(formData.get("sound") || "home");
      const enabled = formData.get("enabled") === "on";

      if (!/^\d{2}:\d{2}$/.test(time)) {
        toast("Horário inválido.");
        return;
      }

      await updateData((data) => {
        data.alarms ||= [];

        if (id) {
          const alarm = data.alarms.find((item) => item.id === id);
          if (!alarm) return;
          Object.assign(alarm, { title, time, days, sound, enabled });
        } else {
          data.alarms.push(createAlarm({ title, time, days, sound, enabled, createdBy: state.uid }));
        }
      });

      closeModal();
      toast(id ? "Alarme salvo." : "Alarme criado.");
    }

    async function toggleAlarm(id) {
      await updateData((data) => {
        const alarm = data.alarms.find((item) => item.id === id);
        if (!alarm) return;
        alarm.enabled = !alarm.enabled;
      });

      toast("Alarme atualizado.");
    }

    async function deleteAlarm(id) {
      const ok = confirm("Apagar alarme?");
      if (!ok) return;

      await updateData((data) => {
        data.alarms = (data.alarms || []).filter((alarm) => alarm.id !== id);
      });

      toast("Alarme apagado.");
    }

    async function saveStory(form) {
      const formData = new FormData(form);
      const type = form.dataset.type || "free";
      const missionId = form.dataset.id || "";
      const mission = state.data.missions.find((item) => item.id === missionId);
      const caption = String(formData.get("caption") || "").trim().slice(0, 300);
      const category = type === "mission" ? mission?.category || "momento" : String(formData.get("category") || "momento");
      const file = getSelectedFile(form, "photo");
      const storyId = makeId("story");

      let photoPayload = { photoData: "", photoWidth: 0, photoHeight: 0, photoSize: 0 };

      if (file) {
        toast("Comprimindo foto...");
        const compressed = await compressStoryPhoto(file);
        photoPayload = {
          photoData: compressed.dataUrl,
          photoWidth: compressed.width,
          photoHeight: compressed.height,
          photoSize: compressed.bytes
        };
      }

      const story = createStory({
        id: storyId,
        type,
        missionId,
        missionTitle: mission?.title || "",
        category,
        caption,
        ...photoPayload,
        authorUid: state.uid,
        authorName: me().name,
        authorPhotoURL: me().googlePhotoURL || me().photoURL || "",
        authorEmoji: me().emoji || "👤",
        authorColor: me().color || "#b77aff"
      });

      await setDoc(storyDocRef(storyId), story);

      closeModal();
      toast("Story postado.");
    }

    async function postMissionTextStory(missionId) {
      const mission = state.data.missions.find((item) => item.id === missionId);
      if (!mission) return;

      const storyId = makeId("story");
      const story = createStory({
        id: storyId,
        type: "mission",
        missionId,
        missionTitle: mission.title,
        category: mission.category,
        caption: "Missão feita ✅",
        authorUid: state.uid,
        authorName: me().name,
        authorPhotoURL: me().googlePhotoURL || me().photoURL || "",
        authorEmoji: me().emoji || "👤",
        authorColor: me().color || "#b77aff"
      });

      await setDoc(storyDocRef(storyId), story);

      closeModal();
      toast("Story postado.");
    }

    async function postGoalStory(goal, amount = 0, saveAsMemory = false, complete = false) {
      const storyId = makeId("story");
      const caption = complete ? `Meta concluída: ${goal.title} 🐷✨` : `Depósito de ${money(amount)} em ${goal.title} 🐷`;

      const story = createStory({
        id: storyId,
        type: "free",
        category: "financeiro",
        caption,
        photoData: goal.coverData || "",
        photoWidth: goal.coverWidth || 0,
        photoHeight: goal.coverHeight || 0,
        photoSize: goal.coverSize || 0,
        savedToMemories: Boolean(saveAsMemory),
        authorUid: state.uid,
        authorName: me().name,
        authorPhotoURL: me().googlePhotoURL || me().photoURL || "",
        authorEmoji: me().emoji || "👤",
        authorColor: me().color || "#b77aff"
      });

      await setDoc(storyDocRef(storyId), story);
    }

    async function postGoalCompleteStory(goalId, saveAsMemory) {
      const goal = state.data.wallet.goals.find((item) => item.id === goalId);
      if (!goal) return;

      await postGoalStory(goal, 0, saveAsMemory, true);

      closeModal();
      toast(saveAsMemory ? "Meta virou memória." : "Story postado.");
    }

    async function reactStory(storyId, emoji) {
      const story = state.stories.find((item) => item.id === storyId);
      if (!story) return;

      const reactions = { ...(story.reactions || {}) };

      if (reactions[state.uid]?.emoji === emoji) {
        delete reactions[state.uid];
      } else {
        reactions[state.uid] = { uid: state.uid, name: me().name, emoji, at: Date.now() };
      }

      await updateDoc(storyDocRef(storyId), { reactions });
      toast("Reação salva.");
    }

    async function addStoryComment(storyId, text) {
      const story = state.stories.find((item) => item.id === storyId);
      if (!story) return;

      const clean = String(text || "").trim().slice(0, 180);
      if (!clean) {
        toast("Escreva um comentário.");
        return;
      }

      const comments = { ...(story.comments || {}) };
      const id = makeId("comment");
      comments[id] = { id, uid: state.uid, name: me().name, text: clean, createdAt: Date.now() };

      await updateDoc(storyDocRef(storyId), { comments });
      toast("Comentário enviado.");
    }

    async function commentStory(form) {
      const storyId = form.dataset.id;
      const formData = new FormData(form);
      const text = String(formData.get("text") || "").trim().slice(0, 180);
      await addStoryComment(storyId, text);
      closeModal();
    }

    async function saveMemory(storyId) {
      await updateDoc(storyDocRef(storyId), { savedToMemories: true });
      toast("Memória salva.");
    }

    async function deleteStory(storyId) {
      const story = state.stories.find((item) => item.id === storyId);
      if (!story) return;

      if (story.authorUid !== state.uid) {
        toast("Só quem postou pode apagar.");
        return;
      }

      const ok = confirm("Apagar story?");
      if (!ok) return;

      await deleteDoc(storyDocRef(storyId));
      toast("Story apagado.");
    }

    async function saveProfileForm(form) {
      const formData = new FormData(form);
      const current = me();
      const file = getSelectedFile(form, "photo");

      let customPhotoData = current.customPhotoData || "";
      let avatarMode = String(formData.get("avatarMode") || current.avatarMode || "google");

      if (file) {
        toast("Comprimindo foto...");
        const compressed = await compressProfilePhoto(file);
        customPhotoData = compressed.dataUrl;
        avatarMode = "upload";
      }

      const profile = {
        ...current,
        uid: state.uid,
        name: String(formData.get("name") || current.name || "Pessoa").trim().slice(0, 32),
        emoji: String(formData.get("emoji") || "👤").trim().slice(0, 4),
        color: String(formData.get("color") || "#b77aff"),
        avatarMode,
        customPhotoData,
        email: state.user.email || current.email || "",
        googlePhotoURL: state.user.photoURL || current.googlePhotoURL || "",
        photoURL: state.user.photoURL || current.photoURL || "",
        provider: "google",
        updatedAt: Date.now()
      };

      const baseName = String(formData.get("baseName") || "Casinha").trim().slice(0, 40);

      await updateData((data) => {
        data.baseName = baseName;
        data.members ||= {};
        data.members[state.uid] = {
          ...(data.members[state.uid] || {}),
          ...profile,
          joinedAt: data.members[state.uid]?.joinedAt || Date.now()
        };
      });

      closeModal();
      toast("Perfil salvo.");
    }

    function hexToPanel(hex) {
      const clean = String(hex || "#1f1a2f").replace("#", "");
      const r = parseInt(clean.slice(0, 2), 16);
      const g = parseInt(clean.slice(2, 4), 16);
      const b = parseInt(clean.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, 0.94)`;
    }

    async function saveCustomTheme(form) {
      const formData = new FormData(form);

      await updateData((data) => {
        data.settings.theme = "custom";
        data.settings.custom = {
          name: "Personalizado",
          bg: String(formData.get("bg")),
          bg2: String(formData.get("bg2")),
          panel: hexToPanel(formData.get("panelColor")),
          primary: String(formData.get("primary")),
          primary2: String(formData.get("primary2")),
          accent: String(formData.get("accent")),
          text: "#f7efff"
        };
      });

      closeModal();
      toast("Tema salvo.");
    }

    async function setTheme(theme) {
      await updateData((data) => {
        data.settings.theme = theme;
        data.settings.custom = null;
      });

      closeModal();
      toast("Tema aplicado.");
    }

    async function saveGoal(form) {
      const formData = new FormData(form);
      const id = form.dataset.id;
      const file = getSelectedFile(form, "photo");
      const current = state.data.wallet.goals.find((item) => item.id === id) || null;

      const title = String(formData.get("title") || "").trim().slice(0, 70);
      const target = clamp(formData.get("target"), 1, 9999999);
      const saved = clamp(formData.get("saved"), 0, 9999999);

      if (!title) {
        toast("Dê um nome.");
        return;
      }

      let coverPayload = {
        coverData: current?.coverData || "",
        coverWidth: current?.coverWidth || 0,
        coverHeight: current?.coverHeight || 0,
        coverSize: current?.coverSize || 0
      };

      if (file) {
        toast("Comprimindo capa...");
        const compressed = await compressGoalCoverPhoto(file);
        coverPayload = {
          coverData: compressed.dataUrl,
          coverWidth: compressed.width,
          coverHeight: compressed.height,
          coverSize: compressed.bytes
        };
      }

      await updateData((data) => {
        data.wallet.goals ||= [];

        if (id) {
          const goal = data.wallet.goals.find((item) => item.id === id);
          if (!goal) return;

          goal.title = title;
          goal.target = target;
          goal.saved = saved;
          goal.coverData = coverPayload.coverData;
          goal.coverWidth = coverPayload.coverWidth;
          goal.coverHeight = coverPayload.coverHeight;
          goal.coverSize = coverPayload.coverSize;
          goal.completedAt = saved >= target ? goal.completedAt || Date.now() : null;
        } else {
          data.wallet.goals.push(createGoal({
            title,
            target,
            saved,
            ...coverPayload,
            createdAt: Date.now(),
            createdBy: state.uid,
            completedAt: saved >= target ? Date.now() : null
          }));
        }
      });

      closeModal();
      toast(id ? "Meta salva." : "Meta criada.");
    }

    async function deleteGoal(id) {
      const ok = confirm("Excluir meta?");
      if (!ok) return;

      await updateData((data) => {
        data.wallet.goals = (data.wallet.goals || []).filter((goal) => goal.id !== id);
        data.wallet.deposits = (data.wallet.deposits || []).filter((deposit) => deposit.goalId !== id);
      });

      closeModal();
      toast("Meta excluída.");
    }

    async function addDeposit(goalId, amount, description, postStory = false, saveMemoryStory = false) {
      const beforeGoal = state.data.wallet.goals.find((item) => item.id === goalId);
      if (!beforeGoal) return;

      const oldSaved = Number(beforeGoal.saved || 0);
      const target = Number(beforeGoal.target || 1);
      const crossedGoal = oldSaved < target && oldSaved + Number(amount) >= target;

      let goalAfter = null;

      await updateData((data) => {
        const goal = data.wallet.goals.find((item) => item.id === goalId);
        if (!goal) return;

        goal.saved = Number(goal.saved || 0) + Number(amount);
        if (goal.saved >= Number(goal.target || 1)) goal.completedAt = goal.completedAt || Date.now();

        goalAfter = { ...goal };

        data.wallet.deposits ||= [];
        data.wallet.deposits.push({
          id: makeId("deposit"),
          goalId,
          amount: Number(amount),
          description: description || `Depósito de ${money(amount)}`,
          uid: state.uid,
          byName: me().name,
          date: todayKey(),
          createdAt: Date.now()
        });

        data.history ||= [];
        data.history.push({
          type: "deposit",
          goalId,
          title: goal.title,
          amount: Number(amount),
          uid: state.uid,
          byName: me().name,
          createdAt: Date.now()
        });
      });

      if (postStory && goalAfter) await postGoalStory(goalAfter, Number(amount), saveMemoryStory, false);

      if (crossedGoal && goalAfter) {
        openGoalCompletedPrompt(goalAfter);
      } else {
        toast(`${money(amount)} guardado.`);
      }
    }

    async function quickDeposit(goalId, amount) {
      await addDeposit(goalId, Number(amount), `Depósito rápido de ${money(amount)}`, false, false);
    }

    async function saveDeposit(form) {
      const goalId = form.dataset.id;
      const formData = new FormData(form);
      const amount = clamp(formData.get("amount"), 0.01, 9999999);
      const description = String(formData.get("description") || `Depósito de ${money(amount)}`).trim().slice(0, 70);
      const postStory = formData.get("postStory") === "on";
      const saveMemoryStory = formData.get("saveMemory") === "on";

      closeModal();
      await addDeposit(goalId, amount, description, postStory, saveMemoryStory);
    }

    async function careSystem(system) {
      await updateData((data) => {
        if (!data.systems[system]) return;
        data.systems[system].health = clamp((data.systems[system].health || 0) + 15, 0, 100);
        data.systems[system].mood = data.systems[system].health >= 70 ? "em ordem" : "melhorando";
        data.systems[system].lastCare = Date.now();
      });

      toast(system === "pets" ? "Pets cuidados." : "Casa cuidada.");
    }

    async function solveOneOverdue() {
      const item = overdueItems()[0];
      if (!item) {
        toast("Nada atrasado.");
        return;
      }
      await toggleDone(item.mission.id, item.key);
    }

    async function encourage(missionId) {
      const mission = state.data.missions.find((item) => item.id === missionId);
      const text = `${ENCOURAGEMENTS[Math.floor(Math.random() * ENCOURAGEMENTS.length)]} — ${mission?.title || "missão"}`;

      try {
        await navigator.clipboard.writeText(text);
        toast("Incentivo copiado.");
      } catch {
        toast(text);
      }
    }

    async function askHelp(missionId) {
      const mission = state.data.missions.find((item) => item.id === missionId);
      const text = `Amor, consegue me ajudar com "${mission?.title || "essa missão"}" hoje? 🏠`;

      try {
        await navigator.clipboard.writeText(text);
        toast("Pedido copiado.");
      } catch {
        toast(text);
      }
    }

    async function copyRoom() {
      const url = `${location.origin}${location.pathname}?room=${state.roomId}`;

      try {
        await navigator.clipboard.writeText(url);
        toast("Convite copiado.");
      } catch {
        toast(`Código: ${state.roomId}`);
      }
    }

    function toast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => toastEl.classList.remove("show"), 2600);
    }

    document.addEventListener("click", async (event) => {
      const pageBtn = event.target.closest("[data-page]");
      const routineBtn = event.target.closest("[data-routine-tab]");
      const storyFilterBtn = event.target.closest("[data-story-filter]");
      const smartModeBtn = event.target.closest("[data-smart-mode]");
      const moreBtn = event.target.closest("[data-more-view]");
      const hallBtn = event.target.closest("[data-hall-filter]");
      const actionBtn = event.target.closest("[data-action]");

      try {
        if (pageBtn) {
          state.page = pageBtn.dataset.page;
          if (state.page !== "mais") state.moreView = "menu";
          render();
          return;
        }

        if (routineBtn) {
          state.rotinaTab = routineBtn.dataset.routineTab;
          render();
          return;
        }

        if (storyFilterBtn) {
          state.storyFilter = storyFilterBtn.dataset.storyFilter;
          render();
          return;
        }

        if (smartModeBtn) {
          state.todayMode = smartModeBtn.dataset.smartMode;
          render();
          return;
        }

        if (moreBtn) {
          state.moreView = moreBtn.dataset.moreView;
          render();
          return;
        }

        if (hallBtn) {
          state.hallFilter = hallBtn.dataset.hallFilter;
          render();
          return;
        }

        if (!actionBtn) return;

        const action = actionBtn.dataset.action;

        if (action === "google-login") await signInGoogle();
        if (action === "logout") await logout();

        if (action === "close-modal") closeModal();
        if (action === "open-profile") openProfileModal();
        if (action === "open-theme") openThemeModal();
        if (action === "open-notices") openNoticesModal();

        if (action === "open-alarms") {
          state.page = "mais";
          state.moreView = "alarmes";
          render();
        }

        if (action === "enable-alarms") await requestAlarmPermission();
        if (action === "open-alarm-form") openAlarmForm();
        if (action === "edit-alarm") openAlarmForm(actionBtn.dataset.id);
        if (action === "toggle-alarm") await toggleAlarm(actionBtn.dataset.id);
        if (action === "delete-alarm") await deleteAlarm(actionBtn.dataset.id);
        if (action === "test-alarm-sound") {
          await unlockAudio();
          await playAlarmSound(actionBtn.dataset.sound || "home");
          toast("Som testado.");
        }
        if (action === "stop-alarm") stopAlarm();

        if (action === "open-quick-mission") openQuickMissionModal();
        if (action === "use-template") await createMissionFromTemplate(actionBtn.dataset.templateId);

        if (action === "open-free-story") openFreeStoryModal();
        if (action === "open-mission-story") openMissionStoryModal(actionBtn.dataset.id, actionBtn.dataset.date);
        if (action === "post-mission-text-story") await postMissionTextStory(actionBtn.dataset.id, actionBtn.dataset.date);
        if (action === "react-story") await reactStory(actionBtn.dataset.id, actionBtn.dataset.emoji);
        if (action === "quick-comment-story") await addStoryComment(actionBtn.dataset.id, actionBtn.dataset.text);
        if (action === "comment-story") openCommentStoryModal(actionBtn.dataset.id);
        if (action === "save-memory") await saveMemory(actionBtn.dataset.id);
        if (action === "delete-story") await deleteStory(actionBtn.dataset.id);
        if (action === "post-goal-complete-story") await postGoalCompleteStory(actionBtn.dataset.id, actionBtn.dataset.memory === "true");

        if (action === "edit-mission") openMissionForm(actionBtn.dataset.id);
        if (action === "mission-menu") openMissionMenu(actionBtn.dataset.id, actionBtn.dataset.date);
        if (action === "toggle-done") await toggleDone(actionBtn.dataset.id, actionBtn.dataset.date);
        if (action === "skip-day") await skipDay(actionBtn.dataset.id, actionBtn.dataset.date);
        if (action === "postpone-mission") await postponeMission(actionBtn.dataset.id, actionBtn.dataset.date);
        if (action === "reschedule-mission") openRescheduleModal(actionBtn.dataset.id, actionBtn.dataset.date);
        if (action === "delete-mission") await deleteMission(actionBtn.dataset.id);
        if (action === "solve-one-overdue") await solveOneOverdue();
        if (action === "encourage") await encourage(actionBtn.dataset.id);
        if (action === "ask-help") await askHelp(actionBtn.dataset.id);

        if (action === "set-theme") await setTheme(actionBtn.dataset.theme);
        if (action === "care-system") await careSystem(actionBtn.dataset.system);

        if (action === "open-goal-form") openGoalForm();
        if (action === "edit-goal") openGoalForm(actionBtn.dataset.id);
        if (action === "open-deposit-form") openDepositForm(actionBtn.dataset.id);
        if (action === "delete-goal") await deleteGoal(actionBtn.dataset.id);
        if (action === "quick-deposit") await quickDeposit(actionBtn.dataset.id, actionBtn.dataset.amount);

        if (action === "copy-room") await copyRoom();

        if (action === "create-room") {
          await createRoom(false);
          closeModal();
        }

        if (action === "join-room") {
          const code = document.getElementById("joinCodeInput")?.value || "";
          await joinRoom(code, false);
          closeModal();
        }
      } catch (error) {
        console.error(error);
        toast(error.message || "Não foi possível concluir.");
      }
    });

    document.addEventListener("submit", async (event) => {
      event.preventDefault();

      try {
        const form = event.target;

        if (form.id === "alarmForm") await saveAlarm(form);
        if (form.id === "quickMissionForm") await saveQuickMission(form);
        if (form.id === "missionForm") await saveMission(form);
        if (form.id === "rescheduleForm") await rescheduleMission(form);
        if (form.id === "profileForm") await saveProfileForm(form);
        if (form.id === "customThemeForm") await saveCustomTheme(form);
        if (form.id === "goalForm") await saveGoal(form);
        if (form.id === "depositForm") await saveDeposit(form);
        if (form.id === "storyForm") await saveStory(form);
        if (form.id === "commentStoryForm") await commentStory(form);
      } catch (error) {
        console.error(error);
        toast(error.message || "Erro ao salvar.");
      }
    });

    document.addEventListener("change", (event) => {
      const input = event.target.closest('input[type="file"][data-image-preview]');
      if (!input) return;
      renderLocalImagePreview(input);
    });

    initFirebase().catch((error) => {
      console.error(error);
      renderLogin();
      toast("Falha ao iniciar Firebase.");
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Casinha</title>

  <style>
    :root {
      --bg: #171425;
      --bg-2: #302b3d;
      --panel: rgba(31, 26, 47, 0.94);
      --card: rgba(255, 255, 255, 0.055);
      --card-2: rgba(255, 255, 255, 0.078);
      --text: #f7efff;
      --muted: rgba(247, 239, 255, 0.64);
      --border: rgba(255, 255, 255, 0.115);
      --primary: #b77aff;
      --primary-2: #f47bca;
      --accent: #ffc247;
      --good: #5de38f;
      --bad: #ff557b;
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.34);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --max: 1040px;
      --nav-h: 76px;
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding-bottom: calc(var(--nav-h) + 46px + env(safe-area-inset-bottom));
      color: var(--text);
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 13% 12%, color-mix(in srgb, var(--primary-2) 28%, transparent), transparent 29%),
        radial-gradient(circle at 88% 8%, color-mix(in srgb, var(--primary) 28%, transparent), transparent 31%),
        radial-gradient(circle at 50% 110%, rgba(255, 255, 255, 0.06), transparent 36%),
        linear-gradient(135deg, var(--bg), var(--bg-2) 76%);
      overflow-x: hidden;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .shell {
      width: min(var(--max), calc(100% - 28px));
      margin: 0 auto;
    }

    .app {
      padding-top: 24px;
    }

    .top-card,
    .panel,
    .notice,
    .modal {
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .top-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 18px;
      border-radius: var(--radius-xl);
      background:
        linear-gradient(90deg, rgba(27, 23, 41, 0.96), rgba(29, 24, 43, 0.88)),
        var(--panel);
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo,
    .avatar,
    .mini-avatar,
    .story-avatar {
      overflow: hidden;
      display: grid;
      place-items: center;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
    }

    .logo {
      position: relative;
      width: 54px;
      height: 54px;
      flex: 0 0 54px;
      border-radius: 21px;
      box-shadow: 0 0 0 8px rgba(255, 255, 255, 0.04);
      font-size: 1.35rem;
    }

    .logo::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.28);
      pointer-events: none;
    }

    .logo img,
    .avatar img,
    .mini-avatar img,
    .story-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.45rem, 4vw, 2.1rem);
      line-height: 1;
      letter-spacing: -0.065em;
    }

    .status-line {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      color: var(--muted);
      font-weight: 900;
      font-size: 0.84rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--good);
      box-shadow: 0 0 18px var(--good);
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 9px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 40px;
      padding: 10px 14px;
      border-radius: 15px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.065);
      color: var(--text);
      font-weight: 1000;
      text-decoration: none;
      transition: transform 0.18s ease, filter 0.18s ease;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
    }

    .btn.primary {
      border-color: transparent;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 14px 34px color-mix(in srgb, var(--primary) 25%, transparent);
    }

    .btn.good {
      border-color: transparent;
      color: #10281a;
      background: var(--good);
    }

    .btn.bad {
      border-color: transparent;
      color: #fff;
      background: color-mix(in srgb, var(--bad) 82%, #211a2f);
    }

    .btn.accent {
      border-color: transparent;
      color: #2d2140;
      background: var(--accent);
    }

    .btn.small {
      min-height: 34px;
      padding: 8px 11px;
      border-radius: 13px;
      font-size: 0.78rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.055);
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 1000;
      line-height: 1.1;
      white-space: nowrap;
    }

    .pill.strong {
      color: var(--text);
      background: rgba(255, 255, 255, 0.09);
    }

    .main-stack {
      display: grid;
      gap: 15px;
      margin-top: 15px;
    }

    .panel {
      padding: 16px;
      border-radius: var(--radius-xl);
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-title h2,
    .section-title h3 {
      margin: 0;
      letter-spacing: -0.055em;
      line-height: 1.08;
    }

    .section-title h2 {
      font-size: 1.45rem;
    }

    .section-title p {
      margin: 5px 0 0;
      color: var(--muted);
      font-weight: 900;
      line-height: 1.45;
    }

    .hero-mission {
      display: grid;
      gap: 14px;
      padding: 18px;
      border-radius: 24px;
      border: 1px solid color-mix(in srgb, var(--primary) 35%, transparent);
      background:
        radial-gradient(circle at top right, color-mix(in srgb, var(--primary-2) 18%, transparent), transparent 40%),
        rgba(255, 255, 255, 0.06);
    }

    .hero-mission h2 {
      margin: 0;
      font-size: clamp(1.55rem, 4vw, 2.45rem);
      letter-spacing: -0.07em;
      line-height: 1;
    }

    .hero-mission p {
      margin: 0;
      color: var(--muted);
      font-weight: 900;
      line-height: 1.45;
    }

    .hero-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .notice {
      min-height: 62px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 16px;
      border-radius: 20px;
      background: rgba(31, 26, 47, 0.74);
      box-shadow: none;
    }

    .notice.suggestion {
      border-color: color-mix(in srgb, var(--accent) 38%, transparent);
    }

    .notice .icon {
      width: 32px;
      flex: 0 0 32px;
      text-align: center;
      font-size: 1.32rem;
    }

    .notice strong {
      display: block;
      font-size: 1rem;
    }

    .notice p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 900;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 14px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat {
      padding: 15px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--card);
    }

    .stat strong {
      display: block;
      font-size: 1.42rem;
      letter-spacing: -0.06em;
    }

    .stat span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.81rem;
      font-weight: 1000;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .mission-card,
    .story-card {
      display: grid;
      gap: 11px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card);
    }

    .mission-main {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
    }

    .mission-title {
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .mission-title strong {
      font-size: 1.05rem;
      line-height: 1.12;
      letter-spacing: -0.03em;
      word-break: break-word;
    }

    .mission-title small {
      color: var(--muted);
      font-weight: 850;
      line-height: 1.35;
    }

    .mission-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex: 0 0 auto;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 7px;
    }

    .done-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 1000;
    }

    .mini-avatar {
      width: 25px;
      height: 25px;
      border-radius: 9px;
      font-size: 0.86rem;
      background: var(--c, var(--primary));
    }

    .avatar {
      width: 48px;
      height: 48px;
      flex: 0 0 48px;
      border-radius: 17px;
      background: var(--c, var(--primary));
      font-size: 1.35rem;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.18);
    }

    .empty {
      min-height: 43px;
      display: grid;
      place-items: center;
      padding: 13px;
      border: 1px dashed var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.025);
      color: var(--muted);
      font-weight: 1000;
      text-align: center;
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px;
      margin-bottom: 14px;
    }

    .segment {
      min-height: 40px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.045);
      color: var(--muted);
      font-weight: 1000;
    }

    .segment.active {
      border-color: transparent;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
    }

    .story-rail {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 3px 0 8px;
      scrollbar-width: none;
    }

    .story-rail::-webkit-scrollbar {
      display: none;
    }

    .story-bubble {
      min-width: 72px;
      display: grid;
      gap: 6px;
      justify-items: center;
      color: var(--text);
      background: transparent;
      padding: 0;
      border: 0;
    }

    .story-avatar {
      width: 58px;
      height: 58px;
      border-radius: 22px;
      background: var(--c, linear-gradient(135deg, var(--primary), var(--primary-2)));
      box-shadow:
        0 0 0 3px rgba(255, 255, 255, 0.08),
        0 0 0 5px color-mix(in srgb, var(--primary) 50%, transparent);
      font-size: 1.45rem;
    }

    .story-bubble span {
      width: 70px;
      overflow: hidden;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 1000;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .story-bubble.add .story-avatar {
      background: rgba(255, 255, 255, 0.07);
      color: var(--accent);
      border: 1px dashed var(--border);
      box-shadow: none;
    }

    .story-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .story-filter {
      min-height: 34px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.055);
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 1000;
    }

    .story-filter.active {
      border-color: transparent;
      color: #2d2140;
      background: var(--accent);
    }

    .week-board {
      display: grid;
      grid-template-columns: repeat(7, minmax(122px, 1fr));
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scroll-snap-type: x proximity;
    }

    .week-day {
      min-height: 255px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.035);
      scroll-snap-align: start;
    }

    .week-day h3 {
      margin: 0 0 10px;
      font-size: 0.98rem;
      letter-spacing: -0.03em;
    }

    .week-list {
      display: grid;
      gap: 8px;
    }

    .week-mini {
      display: grid;
      gap: 7px;
      min-height: 128px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
    }

    .week-mini strong {
      font-size: 0.9rem;
      line-height: 1.08;
      word-break: break-word;
    }

    .member-grid,
    .more-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .member-card {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card);
    }

    .member-card strong {
      display: block;
      font-size: 1.05rem;
    }

    .member-card span {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 1000;
    }

    .progress {
      height: 11px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .progress span {
      display: block;
      width: var(--w, 0%);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--primary), var(--primary-2));
    }

    .story-head {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .story-head strong {
      display: block;
    }

    .story-head span {
      display: block;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 900;
    }

    .story-photo-placeholder {
      min-height: 180px;
      display: grid;
      place-items: center;
      border: 1px dashed var(--border);
      border-radius: 18px;
      background:
        radial-gradient(circle at top right, color-mix(in srgb, var(--primary-2) 15%, transparent), transparent 36%),
        rgba(255, 255, 255, 0.035);
      color: var(--muted);
      font-weight: 1000;
      text-align: center;
      padding: 16px;
    }

    .story-photo {
      width: 100%;
      max-height: 620px;
      object-fit: cover;
      border-radius: 18px;
      display: block;
      background: rgba(255, 255, 255, 0.05);
    }

    .story-caption {
      margin: 0;
      color: var(--text);
      font-weight: 900;
      line-height: 1.5;
    }

    .reaction-row,
    .quick-comments {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .reaction-btn,
    .quick-comment-btn {
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.055);
      color: var(--text);
      font-weight: 1000;
    }

    .reaction-btn.active {
      background: var(--accent);
      color: #2d2140;
      border-color: transparent;
    }

    .quick-comment-btn {
      color: var(--muted);
      font-size: 0.77rem;
    }

    .achievement-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .ach-tab {
      min-height: 34px;
      padding: 8px 12px;
      border-radius: 13px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.055);
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 1000;
    }

    .ach-tab.active {
      border-color: transparent;
      color: #2d2140;
      background: var(--accent);
    }

    .achievement-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .achievement {
      min-height: 96px;
      display: grid;
      place-items: center;
      gap: 8px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.035);
      text-align: center;
      font-weight: 1000;
    }

    .achievement .big {
      font-size: 1.55rem;
      opacity: 0.55;
      filter: grayscale(1);
    }

    .achievement.unlocked {
      border-color: color-mix(in srgb, var(--primary) 40%, transparent);
      background: rgba(255, 255, 255, 0.06);
    }

    .achievement.unlocked .big {
      opacity: 1;
      filter: none;
    }

    .history-list {
      display: grid;
      gap: 10px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 13px;
      border: 1px solid var(--border);
      border-radius: 17px;
      background: rgba(255, 255, 255, 0.045);
      font-weight: 1000;
    }

    .history-item span {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .quick-money {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .more-card {
      min-height: 92px;
      display: grid;
      align-content: center;
      gap: 5px;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card);
      color: var(--text);
      text-align: left;
    }

    .more-card strong {
      font-size: 1rem;
    }

    .more-card span {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 900;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: max(16px, env(safe-area-inset-bottom));
      z-index: 50;
      width: min(680px, calc(100% - 24px));
      min-height: var(--nav-h);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: rgba(25, 21, 38, 0.88);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(20px);
      transform: translateX(-50%);
    }

    .nav-btn {
      display: grid;
      place-items: center;
      gap: 4px;
      padding: 8px 6px;
      border-radius: 16px;
      background: transparent;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 1000;
    }

    .nav-btn.active {
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 1000;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      padding: 12px 13px;
      border: 1px solid var(--border);
      border-radius: 15px;
      outline: none;
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
    }

    .field textarea {
      min-height: 92px;
      resize: vertical;
    }

    .field input[type="color"] {
      min-height: 46px;
      padding: 5px;
    }

    .form-grid {
      display: grid;
      gap: 12px;
    }

    .form-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .day-checks {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 7px;
    }

    .day-checks label {
      min-height: 38px;
      display: grid;
      place-items: center;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      font-weight: 1000;
      cursor: pointer;
    }

    .day-checks input {
      display: none;
    }

    .day-checks label:has(input:checked) {
      border-color: transparent;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
    }

    .file-upload-card {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px dashed var(--border);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
    }

    .file-upload-card input[type="file"] {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 15px;
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
    }

    .image-preview {
      min-height: 150px;

      return date.toISOString().slice(0, 10);

      const copy = new Date(date);
      copy.setMinutes(copy.getMinutes() - copy.getTimezoneOffset());

      if (hours < 24) return `${hours}h`;

      if (!file) return;

      const maxOriginalSize = 12 * 1024 * 1024;

      if (file.size > maxOriginalSize) {

    function loadImageFromFile(file) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const image = new Image();

        image.onload = () => {
          URL.revokeObjectURL(url);
          resolve(image);
        };

        image.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error("Não foi possível ler a imagem."));
        };

        image.src = url;

    function estimateDataUrlBytes(dataUrl) {
      const base64 = String(dataUrl).split(",")[1] || "";
      return Math.round((base64.length * 3) / 4);
    }

    async function compressImageToDataUrl(file, options = {}) {
      assertImageFile(file);

      const {
        maxSide = 850,
        quality = 0.66,
        square = false,
        maxChars = 720000
      } = options;

      const image = await loadImageFromFile(file);

      let currentMaxSide = maxSide;
      let currentQuality = quality;

      for (let attempt = 0; attempt < 10; attempt += 1) {
        let sourceX = 0;
        let sourceY = 0;
        let sourceWidth = image.naturalWidth || image.width;
        let sourceHeight = image.naturalHeight || image.height;

        if (square) {
          const side = Math.min(sourceWidth, sourceHeight);
          sourceX = Math.floor((sourceWidth - side) / 2);
          sourceY = Math.floor((sourceHeight - side) / 2);
          sourceWidth = side;
          sourceHeight = side;
        }

        const scale = Math.min(1, currentMaxSide / Math.max(sourceWidth, sourceHeight));
        const outputWidth = Math.max(1, Math.round(sourceWidth * scale));
        const outputHeight = Math.max(1, Math.round(sourceHeight * scale));

        const canvas = document.createElement("canvas");
        canvas.width = outputWidth;
        canvas.height = outputHeight;

        const context = canvas.getContext("2d", { alpha: false });
        context.fillStyle = "#111";
        context.fillRect(0, 0, outputWidth, outputHeight);
        context.imageSmoothingEnabled = true;
        context.imageSmoothingQuality = "high";
        context.drawImage(
          image,
          sourceX,
          sourceY,
          sourceWidth,
          sourceHeight,
          0,
          0,
          outputWidth,
          outputHeight
        );

        const dataUrl = canvas.toDataURL("image/jpeg", currentQuality);

        if (dataUrl.length <= maxChars) {
          return {
            dataUrl,
            width: outputWidth,
            height: outputHeight,
            bytes: estimateDataUrlBytes(dataUrl)
          };
        }

        currentMaxSide = Math.max(420, Math.floor(currentMaxSide * 0.86));
        currentQuality = Math.max(0.42, currentQuality - 0.06);
      }

      throw new Error("Não consegui comprimir a foto o suficiente. Tente uma imagem menor.");
    }

    async function updateData(mutator) {
      if (!state.cloudReady || !state.roomId) {
        throw new Error("A Casinha ainda não está sincronizada.");

      const ref = doc(state.db, COLLECTION, state.roomId);

      await runTransaction(state.db, async (transaction) => {
        const snapshot = await transaction.get(ref);
        const current = ensureDataShape(snapshot.exists() ? snapshot.data() : defaultData(state.roomId));

        mutator(current);
        current.updatedAt = Date.now();

        transaction.set(ref, current);
      });
    }

    async function joinRoom(roomId, silent = false) {
      const code = normalizeRoomCode(roomId);

      if (code.length !== 6) {
        toast("Código inválido.");
        return;
      }

      const profile = {
        ...googleProfileFromUser(),
        joinedAt: Date.now()
      };

      await setDoc(doc(state.db, COLLECTION, code), {
        roomId: code,
        members: {

        updatedAt: Date.now()
      }, { merge: true });

      state.cloudReady = true;
      localStorage.setItem(STORAGE.room, code);
      subscribeRoom(code, false);

        toast(`Entrou na sala ${code}.`);

    function subscribeRoom(roomId, fallbackCreate = false) {
      if (state.unsubscribe) {
        state.unsubscribe();
      }

      state.roomId = roomId;
      state.cloudReady = true;

      state.unsubscribe = onSnapshot(
        doc(state.db, COLLECTION, roomId),
        async (snapshot) => {
          if (!snapshot.exists()) {
            if (fallbackCreate) {
              localStorage.removeItem(STORAGE.room);
              await createRoom(true);
              return;
            }

            toast("Sala não encontrada.");
            return;
          }

          state.data = ensureDataShape(snapshot.data());
          applyTheme();
          subscribeStories(roomId);
          render();
        },
        async (error) => {
          console.error(error);

          if (fallbackCreate) {
            localStorage.removeItem(STORAGE.room);
            await createRoom(true);
            return;
          }

          toast("Erro ao sincronizar. Confira as Rules do Firestore.");
        }
      );
    }

    function members() {
      return Object.values(state.data?.members || {});
    }

    function me() {
      return state.data?.members?.[state.uid] || googleProfileFromUser();
    }

    function missionStartKey(mission) {
      return dateKey(new Date(mission.createdAt || Date.now()));
    }

    function isDueOn(mission, key) {
      if (key < missionStartKey(mission)) return false;

      const date = fromKey(key);
      const day = date.getDay();

      if (mission.frequency === "daily") return true;
      if (mission.frequency === "weekly") return (mission.days || []).map(Number).includes(day);
      if (mission.frequency === "monthly") return date.getDate() === Number(mission.monthDay || 1);
      return mission.date === key;
    }

    function isSkipped(mission, key) {
      return Boolean(mission.skipped?.[key]);
    }

    function doneMap(mission, key) {
      return mission.done?.[key] || {};
    }

    function doneByMe(mission, key = todayKey()) {
      return Boolean(doneMap(mission, key)[state.uid]);
    }

    function doneMembers(mission, key = todayKey()) {
      const map = doneMap(mission, key);
      return members().filter((person) => map[person.uid]);
    }

    function missingPeople(mission, key) {
      if (mission.assigned !== "both") return [];

      const map = doneMap(mission, key);
      return members().filter((person) => !map[person.uid]);
    }

    function baseComplete(mission, key = todayKey()) {
      if (isSkipped(mission, key)) return true;

      const map = doneMap(mission, key);

      if (mission.assigned === "both" && members().length > 1) {
        return members().every((person) => Boolean(map[person.uid]));
      }

      return Object.values(map).some(Boolean);
    }

    function dueDatesForMission(mission, back = 45, forward = 0) {
      const dates = [];

      for (let offset = -back; offset <= forward; offset += 1) {
        const key = todayKey(offset);

        if (isDueOn(mission, key) && !isSkipped(mission, key)) {
          dates.push(key);
        }
      }

      return dates;
    }

    function missionsDueToday() {
      return state.data.missions.filter((mission) => isDueOn(mission, todayKey()) && !isSkipped(mission, todayKey()));
    }

    function missionsByFrequency(frequency) {
      return state.data.missions.filter((mission) => mission.frequency === frequency);
    }

    function overdueItems() {
      const items = [];

      for (const mission of state.data.missions) {
        for (const key of dueDatesForMission(mission, 45, -1)) {
          if (!baseComplete(mission, key)) {
            items.push({ mission, key });
          }
        }
      }

      return items.sort((a, b) => {
        const energy = Number(a.mission.energy || 1) - Number(b.mission.energy || 1);
        if (energy !== 0) return energy;
        const minutes = Number(a.mission.minutes || 5) - Number(b.mission.minutes || 5);
        if (minutes !== 0) return minutes;
        return a.key.localeCompare(b.key);
      });
    }

    function systemPriority(category) {
      if (category === "pets") return 100 - systemHealth("pets");
      if (category === "casa") return 100 - systemHealth("casa");
      return 0;
    }

    function suggestedMission() {
      const overdue = overdueItems();

      if (overdue.length) {
        return {
          ...overdue[0],
          reason: "Comece por essa. É pequena e destrava o recomeço."
        };
      }

      const today = todayKey();
      const todayPending = missionsDueToday()
        .filter((mission) => !baseComplete(mission, today))
        .sort((a, b) => {
          const systemA = systemPriority(a.category);
          const systemB = systemPriority(b.category);
          if (systemA !== systemB) return systemB - systemA;
          const energy = Number(a.energy || 1) - Number(b.energy || 1);
          if (energy !== 0) return energy;
          return Number(a.minutes || 5) - Number(b.minutes || 5);
        })[0];

      if (todayPending) {
        return {
          mission: todayPending,
          key: today,
          reason: "Essa ajuda a Casinha hoje."
        };
      }

      for (let offset = 1; offset <= 31; offset += 1) {
        const key = todayKey(offset);
        const found = state.data.missions.find((mission) => isDueOn(mission, key) && !isSkipped(mission, key));

        if (found) {
          return {
            mission: found,
            key,
            reason: "Próxima missão programada."
          };
        }
      }

      return null;
    }

    function nextKeyForMission(mission) {
      for (let offset = 0; offset <= 40; offset += 1) {
        const key = todayKey(offset);
        if (isDueOn(mission, key) && !isSkipped(mission, key)) return key;
      }

      return mission.date || todayKey();
    }

    function completedEvents() {
      const events = [];

      for (const mission of state.data.missions) {
        for (const [key, map] of Object.entries(mission.done || {})) {
          for (const [uid, value] of Object.entries(map || {})) {
            if (value) {
              events.push({
                type: "mission",
                mission,
                key,
                uid,
                at: typeof value === "number" ? value : Date.now()
              });
            }
          }
        }
      }

      return events;
    }

    function scoreFor(uid) {
      return completedEvents()
        .filter((event) => event.uid === uid)
        .reduce((sum, event) => sum + Number(event.mission.xp || 0), 0);
    }

    function categoryDoneCount(category) {
      return completedEvents().filter((event) => event.mission.category === category).length;
    }

    function minutesDone() {
      return completedEvents().reduce((sum, event) => sum + Number(event.mission.minutes || 0), 0);
    }

    function walletSaved() {
      return (state.data.wallet.goals || []).reduce((sum, goal) => sum + Number(goal.saved || 0), 0);
    }

    function walletTarget() {
      return (state.data.wallet.goals || []).reduce((sum, goal) => sum + Number(goal.target || 0), 0);
    }

    function storiesPosted() {
      return state.stories.length;
    }

    function memoriesSaved() {
      return state.stories.filter((story) => story.savedToMemories).length;
    }

    function perfectDayCount() {
      let count = 0;

      for (let offset = 0; offset >= -120; offset -= 1) {
        const key = todayKey(offset);
        const due = state.data.missions.filter((mission) => isDueOn(mission, key) && !isSkipped(mission, key));

        if (due.length && due.every((mission) => baseComplete(mission, key))) {
          count += 1;
        }
      }

      return count;
    }

    function currentStreak() {
      let streak = 0;

      for (let offset = 0; offset >= -90; offset -= 1) {
        const key = todayKey(offset);
        const due = state.data.missions.filter((mission) => isDueOn(mission, key) && !isSkipped(mission, key));

        if (!due.length || !due.every((mission) => baseComplete(mission, key))) {
          break;
        }

        streak += 1;
      }

      return streak;
    }

    function metrics() {
      const events = completedEvents();

      return {
        missionsDone: events.length,
        perfectDays: perfectDayCount(),
        petsDone: categoryDoneCount("pets"),
        casaDone: categoryDoneCount("casa"),
        financeiroDone: categoryDoneCount("financeiro"),
        relacionamentoDone: categoryDoneCount("relacionamento"),
        saudeDone: categoryDoneCount("saude"),
        minutesDone: minutesDone(),
        moneySaved: walletSaved(),
        storiesPosted: storiesPosted(),
        memoriesSaved: memoriesSaved()
      };
    }

    function unlockedCount() {
      const m = metrics();
      return ACHIEVEMENTS.filter((achievement) => m[achievement[4]] >= achievement[3]).length;
    }

    function dayPerfectRemaining() {
      return missionsDueToday().filter((mission) => !baseComplete(mission, todayKey())).length;
    }

    function systemHealth(category) {
      if (category === "pets") return state.data.systems.pets.health || 0;
      if (category === "casa") return state.data.systems.casa.health || 0;
      return 0;
    }

    function activeStories() {
      return state.stories
        .filter((story) => story.expiresAt > Date.now() || story.savedToMemories)
        .sort((a, b) => b.createdAt - a.createdAt);
    }

    function filteredStories() {
      const filter = state.storyFilter;
      const list = activeStories();

      if (filter === "todos") return list;
      if (filter === "missoes") return list.filter((story) => story.type === "mission");
      if (filter === "momentos") return list.filter((story) => story.type === "free" || story.category === "momento");
      if (filter === "pets") return list.filter((story) => story.category === "pets");
      if (filter === "casa") return list.filter((story) => story.category === "casa");
      if (filter === "cofrinho") return list.filter((story) => story.category === "financeiro");
      if (filter === "memorias") return list.filter((story) => story.savedToMemories);

      return list;
    }

    function memoryStories() {
      return state.stories
        .filter((story) => story.savedToMemories)
        .sort((a, b) => b.createdAt - a.createdAt);
    }

    function renderStoryCard(story) {
      const author = state.data.members?.[story.authorUid] || {
        name: story.authorName,
        photoURL: story.authorPhotoURL,
        googlePhotoURL: story.authorPhotoURL,
        emoji: story.authorEmoji || "👤",
        color: story.authorColor || "#b77aff",
        avatarMode: story.authorPhotoURL ? "google" : "emoji"
      };

      const cat = categoryOf(story.category);
      const reactions = Object.values(story.reactions || {});
      const comments = Object.values(story.comments || {}).sort((a, b) => a.createdAt - b.createdAt);
      const myReaction = story.reactions?.[state.uid]?.emoji || "";

      return `
        <article class="story-card">
          <div class="story-head">
            ${imageHTML(author, "avatar")}
            <div>
              <strong>${escapeHTML(author.name || story.authorName || "Pessoa")}</strong>
              <span>${story.type === "mission" ? `concluiu ${escapeHTML(story.missionTitle || "uma missão")}` : "postou um momento"} · ${timeAgo(story.createdAt)}</span>
            </div>
          </div>

          <div class="badges">
            <span class="pill">${cat.icon} ${cat.label}</span>
            ${story.savedToMemories ? `<span class="pill strong">💾 memória</span>` : ""}
            ${story.expiresAt <= Date.now() && !story.savedToMemories ? `<span class="pill">expirado</span>` : ""}
            ${story.photoSize ? `<span class="pill">${Math.round(story.photoSize / 1024)} KB</span>` : ""}
          </div>

          ${story.photoData ? `
            <img class="story-photo" src="${escapeHTML(story.photoData)}" alt="">
          ` : `
            <div class="story-photo-placeholder">
              📷 Story sem foto<br>
              <small>Também vale registrar só com texto.</small>
            </div>
          `}

          ${story.caption ? `<p class="story-caption">${escapeHTML(story.caption)}</p>` : ""}

          <div class="reaction-row">
            ${REACTIONS.map((emoji) => `
              <button class="reaction-btn ${myReaction === emoji ? "active" : ""}" data-action="react-story" data-id="${escapeHTML(story.id)}" data-emoji="${emoji}" type="button">
                ${emoji}
              </button>
            `).join("")}
          </div>

          <div class="done-row">
            ${reactions.length ? `Reações: ${reactions.map((reaction) => reaction.emoji).join(" ")}` : "Sem reações ainda."}

            ${QUICK_COMMENTS.map((text) => `
              <button class="quick-comment-btn" data-action="quick-comment-story" data-id="${escapeHTML(story.id)}" data-text="${escapeHTML(text)}" type="button">${escapeHTML(text)}</button>
            `).join("")}
          </div>

          <div class="list">
            ${comments.slice(-3).map((comment) => `
              <div class="history-item">
                <div>

                  <span>${escapeHTML(comment.text)}</span>
                </div>
              </div>

      const start = startOfWeekMonday();

      const columns = WEEK_ORDER.map((dayIndex, orderIndex) => {
        const date = new Date(start);
        date.setDate(start.getDate() + orderIndex);
        const key = dateKey(date);
        const missions = state.data.missions.filter((mission) => mission.frequency === "weekly" && isDueOn(mission, key));

        return `
          <div class="week-day">
            <h3>${DAY_NAMES[dayIndex]}</h3>
            <div class="week-list">
              ${missions.length ? missions.map((mission) => renderWeekMiniCard(mission, key)).join("") : `<div class="empty">—</div>`}
            </div>
          </div>
        `;
      }).join("");

      return `<div class="week-board">${columns}</div>`;

        html: `

            <div>

            </div>
            <strong>${story.savedToMemories ? "memória" : "story"}</strong>
          </div>
        `
      }));

      const history = [...missionEvents, ...walletEvents, ...storyEvents]
        .sort((a, b) => b.at - a.at)
        .slice(0, 90);

      return `

          <div class="section-title">
            <div>

          </div>
        </section>
      `;

    async function toggleDone(missionId, key) {
      const missionBefore = state.data.missions.find((item) => item.id === missionId);
      const willMarkDone = missionBefore && !doneByMe(missionBefore, key);

      await updateData((data) => {
        const mission = data.missions.find((item) => item.id === missionId);
        if (!mission) return;

        mission.done ||= {};
        mission.done[key] ||= {};

        const wasDone = Boolean(mission.done[key][state.uid]);

        if (wasDone) {
          delete mission.done[key][state.uid];
        } else {
          mission.done[key][state.uid] = Date.now();

          data.history ||= [];
          data.history.push({
            type: "mission",
            missionId,
            title: mission.title,
            category: mission.category,
            uid: state.uid,
            byName: me().name,
            date: key,
            xp: mission.xp,
            createdAt: Date.now()
          });

          if (mission.category === "pets") {
            data.systems.pets.health = clamp((data.systems.pets.health || 0) + 12, 0, 100);
            data.systems.pets.mood = data.systems.pets.health >= 70 ? "feliz" : "melhorando";
            data.systems.pets.lastCare = Date.now();
          }

          if (mission.category === "casa") {
            data.systems.casa.health = clamp((data.systems.casa.health || 0) + 10, 0, 100);
            data.systems.casa.mood = data.systems.casa.health >= 70 ? "em ordem" : "melhorando";
            data.systems.casa.lastCare = Date.now();
          }
        }

        if (mission.done[key] && Object.keys(mission.done[key]).length === 0) {
          delete mission.done[key];
        }
      });

      closeModal();

      if (willMarkDone && missionBefore) {
        openAfterDoneStoryPrompt(missionBefore, key);
      } else {
        toast("Casinha atualizada.");
      }
    }

    async function saveMission(form) {
      const formData = new FormData(form);
      const id = form.dataset.id;
      const days = formData.getAll("days").map(Number);
      const minutes = clamp(formData.get("minutes"), 1, 600);

      const payload = {
        title: String(formData.get("title") || "").trim().slice(0, 70),
        description: String(formData.get("description") || "").trim().slice(0, 260),
        category: String(formData.get("category") || "casa"),
        frequency: String(formData.get("frequency") || "daily"),
        days: days.length ? days : [new Date().getDay()],
        monthDay: clamp(formData.get("monthDay"), 1, 31),
        date: String(formData.get("date") || todayKey()),
        assigned: String(formData.get("assigned") || "any"),
        minutes,
        xp: clamp(formData.get("xp") || xpByMinutes(minutes), 1, 200),
        energy: energyNumber(formData.get("energy") || "leve")
      };

      if (!payload.title) {
        toast("Dê um título para a missão.");
        return;
      }

      await updateData((data) => {
        const mission = data.missions.find((item) => item.id === id);
        if (!mission) return;
        Object.assign(mission, payload);
      });

      closeModal();
      toast("Missão atualizada.");
    }

    async function saveStory(form) {
      const formData = new FormData(form);
      const type = form.dataset.type || "free";
      const missionId = form.dataset.id || "";
      const mission = state.data.missions.find((item) => item.id === missionId);
      const caption = String(formData.get("caption") || "").trim().slice(0, 300);
      const category = type === "mission" ? mission?.category || "momento" : String(formData.get("category") || "momento");
      const file = getSelectedFile(form, "photo");
      const storyId = makeId("story");

      let photoPayload = {
        photoData: "",
        photoWidth: 0,
        photoHeight: 0,
        photoSize: 0
      };

      if (file) {
        toast("Comprimindo foto do story...");
        const compressed = await compressStoryPhoto(file);
        photoPayload = {
          photoData: compressed.dataUrl,
          photoWidth: compressed.width,
          photoHeight: compressed.height,
          photoSize: compressed.bytes
        };
      }

      const story = createStory({
        id: storyId,
        type,
        missionId,
        missionTitle: mission?.title || "",
        category,
        caption,
        ...photoPayload,
        authorUid: state.uid,
        authorName: me().name,
        authorPhotoURL: me().googlePhotoURL || me().photoURL || "",
        authorEmoji: me().emoji || "👤",
        authorColor: me().color || "#b77aff"
      });

      await setDoc(storyDocRef(storyId), story);

      closeModal();
      toast(file ? "Story com foto postado." : "Story postado.");
    }

    async function reactStory(storyId, emoji) {
      const story = state.stories.find((item) => item.id === storyId);
      if (!story) return;

      const reactions = {
        ...(story.reactions || {})
      };

      if (reactions[state.uid]?.emoji === emoji) {
        delete reactions[state.uid];
      } else {
        reactions[state.uid] = {
          uid: state.uid,
          name: me().name,
          emoji,
          at: Date.now()
        };
      }

      await updateDoc(storyDocRef(storyId), {
        reactions
      });

      toast("Reação salva.");
    }

    async function addStoryComment(storyId, text) {
      const story = state.stories.find((item) => item.id === storyId);
      if (!story) return;

      const clean = String(text || "").trim().slice(0, 180);

      if (!clean) {
        toast("Escreva um comentário.");
        return;

      const comments = {
        ...(story.comments || {})
      };

      comments[id] = {
        id,
        uid: state.uid,
        name: me().name,
        text: clean,
        createdAt: Date.now()
      };

      await updateDoc(storyDocRef(storyId), {

    function hexToPanel(hex) {
      const clean = String(hex || "#1f1a2f").replace("#", "");
      const r = parseInt(clean.slice(0, 2), 16);
      const g = parseInt(clean.slice(2, 4), 16);
      const b = parseInt(clean.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, 0.94)`;
    }

    async function saveGoal(form) {
      const formData = new FormData(form);
      const id = form.dataset.id;
      const title = String(formData.get("title") || "").trim().slice(0, 70);
      const target = clamp(formData.get("target"), 1, 9999999);
      const saved = clamp(formData.get("saved"), 0, 9999999);

      if (!title) {
        toast("Dê um nome para a meta.");
        return;
      }

      await updateData((data) => {
        data.wallet.goals ||= [];

        if (id) {
          const goal = data.wallet.goals.find((item) => item.id === id);
          if (!goal) return;

          goal.title = title;
          goal.target = target;
          goal.saved = saved;
        } else {
          data.wallet.goals.push({
            id: makeId("goal"),
            title,
            target,
            saved,
            createdAt: Date.now(),
            createdBy: state.uid
          });
        }
      });

      closeModal();
      toast(id ? "Meta atualizada." : "Meta criada.");
    }

    async function deleteGoal(id) {

      await updateData((data) => {
        data.wallet.goals = (data.wallet.goals || []).filter((goal) => goal.id !== id);
        data.wallet.deposits = (data.wallet.deposits || []).filter((deposit) => deposit.goalId !== id);
      });

      closeModal();
      toast("Meta excluída.");
    }

        if (!goal) return;

        goal.saved = Number(goal.saved || 0) + Number(amount);

        data.wallet.deposits ||= [];
        data.wallet.deposits.push({
          id: makeId("deposit"),
          goalId,
          amount: Number(amount),
          description: `Depósito rápido de ${money(amount)}`,
          uid: state.uid,
          byName: me().name,
          date: todayKey(),
          createdAt: Date.now()
        });
      });

    document.addEventListener("click", async (event) => {
      const pageBtn = event.target.closest("[data-page]");
      const routineBtn = event.target.closest("[data-routine-tab]");
      const storyFilterBtn = event.target.closest("[data-story-filter]");
      const moreBtn = event.target.closest("[data-more-view]");
      const hallBtn = event.target.closest("[data-hall-filter]");
      const actionBtn = event.target.closest("[data-action]");

      try {
        if (pageBtn) {
          state.page = pageBtn.dataset.page;
          if (state.page !== "mais") state.moreView = "menu";
          render();
          return;
        }

        if (routineBtn) {
          state.rotinaTab = routineBtn.dataset.routineTab;
          render();
          return;
        }

        if (storyFilterBtn) {
          state.storyFilter = storyFilterBtn.dataset.storyFilter;
          render();
          return;
        }

        if (moreBtn) {
          state.moreView = moreBtn.dataset.moreView;
          render();
          return;
        }

        if (hallBtn) {
          state.hallFilter = hallBtn.dataset.hallFilter;
          render();
          return;
        }

        if (!actionBtn) return;

        const action = actionBtn.dataset.action;

        if (action === "google-login") await signInGoogle();
        if (action === "logout") await logout();

        if (action === "close-modal") closeModal();
        if (action === "open-profile") openProfileModal();
        if (action === "open-theme") openThemeModal();
        if (action === "open-notices") openNoticesModal();
        if (action === "open-quick-mission") openQuickMissionModal();

        if (action === "open-free-story") openFreeStoryModal();
        if (action === "open-mission-story") openMissionStoryModal(actionBtn.dataset.id, actionBtn.dataset.date);
        if (action === "post-mission-text-story") await postMissionTextStory(actionBtn.dataset.id, actionBtn.dataset.date);
        if (action === "react-story") await reactStory(actionBtn.dataset.id, actionBtn.dataset.emoji);
        if (action === "quick-comment-story") await addStoryComment(actionBtn.dataset.id, actionBtn.dataset.text);
        if (action === "comment-story") openCommentStoryModal(actionBtn.dataset.id);
        if (action === "save-memory") await saveMemory(actionBtn.dataset.id);
        if (action === "delete-story") await deleteStory(actionBtn.dataset.id);

        if (action === "edit-mission") openMissionForm(actionBtn.dataset.id);
        if (action === "view-mission") openMissionView(actionBtn.dataset.id, actionBtn.dataset.date);
        if (action === "mission-menu") openMissionMenu(actionBtn.dataset.id, actionBtn.dataset.date);
        if (action === "toggle-done") await toggleDone(actionBtn.dataset.id, actionBtn.dataset.date);
        if (action === "skip-day") await skipDay(actionBtn.dataset.id, actionBtn.dataset.date);
        if (action === "postpone-mission") await postponeMission(actionBtn.dataset.id, actionBtn.dataset.date);
        if (action === "reschedule-mission") openRescheduleModal(actionBtn.dataset.id, actionBtn.dataset.date);
        if (action === "delete-mission") await deleteMission(actionBtn.dataset.id);
        if (action === "solve-one-overdue") await solveOneOverdue();
        if (action === "encourage") await encourage(actionBtn.dataset.id);
        if (action === "ask-help") await askHelp(actionBtn.dataset.id);

        if (action === "set-theme") await setTheme(actionBtn.dataset.theme);
        if (action === "care-system") await careSystem(actionBtn.dataset.system);

        if (action === "open-goal-form") openGoalForm();
        if (action === "edit-goal") openGoalForm(actionBtn.dataset.id);
        if (action === "open-deposit-form") openDepositForm(actionBtn.dataset.id);
        if (action === "delete-goal") await deleteGoal(actionBtn.dataset.id);
        if (action === "quick-deposit") await quickDeposit(actionBtn.dataset.id, actionBtn.dataset.amount);

        if (action === "copy-room") await copyRoom();

        if (action === "create-room") {
          await createRoom(false);
          closeModal();
        }

        if (action === "join-room") {
          const code = document.getElementById("joinCodeInput")?.value || "";
          await joinRoom(code, false);
          closeModal();
        }
      } catch (error) {
        console.error(error);
        toast(error.message || "Não foi possível concluir.");
      }
    });

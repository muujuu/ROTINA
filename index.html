<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Base da Família</title>

  <style>
    :root {
      --bg: #171425;
      --bg-2: #302b3d;
      --panel: rgba(31, 26, 47, 0.94);
      --panel-2: rgba(38, 31, 58, 0.9);
      --card: rgba(255, 255, 255, 0.055);
      --card-2: rgba(255, 255, 255, 0.075);
      --text: #f7efff;
      --muted: rgba(247, 239, 255, 0.64);
      --border: rgba(255, 255, 255, 0.115);
      --border-strong: rgba(255, 255, 255, 0.18);
      --primary: #b77aff;
      --primary-2: #f47bca;
      --accent: #ffc247;
      --good: #5de38f;
      --bad: #ff557b;
      --warn: #ffd15c;
      --info: #82caff;
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.34);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --max: 1040px;
      --nav-h: 76px;
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding-bottom: calc(var(--nav-h) + 46px + env(safe-area-inset-bottom));
      color: var(--text);
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 13% 12%, color-mix(in srgb, var(--primary-2) 28%, transparent), transparent 29%),
        radial-gradient(circle at 88% 8%, color-mix(in srgb, var(--primary) 28%, transparent), transparent 31%),
        radial-gradient(circle at 50% 110%, rgba(255, 255, 255, 0.06), transparent 36%),
        linear-gradient(135deg, var(--bg), var(--bg-2) 76%);
      overflow-x: hidden;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .shell {
      width: min(var(--max), calc(100% - 28px));
      margin: 0 auto;
    }

    .app {
      padding-top: 24px;
    }

    .top-card,
    .panel,
    .notice,
    .modal {
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .top-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 18px;
      border-radius: var(--radius-xl);
      background:
        linear-gradient(90deg, rgba(27, 23, 41, 0.96), rgba(29, 24, 43, 0.88)),
        var(--panel);
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      position: relative;
      width: 54px;
      height: 54px;
      flex: 0 0 54px;
      display: grid;
      place-items: center;
      border-radius: 21px;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 0 0 8px rgba(255, 255, 255, 0.04);
      font-size: 1.35rem;
    }

    .logo::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.28);
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.45rem, 4vw, 2.1rem);
      line-height: 1;
      letter-spacing: -0.065em;
    }

    .status-line {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      color: var(--muted);
      font-weight: 900;
      font-size: 0.84rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--good);
      box-shadow: 0 0 18px var(--good);
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 9px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 40px;
      padding: 10px 14px;
      border-radius: 15px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.065);
      color: var(--text);
      font-weight: 1000;
      text-decoration: none;
      transition: transform 0.18s ease, filter 0.18s ease, background 0.18s ease;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
    }

    .btn.primary {
      border-color: transparent;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      box-shadow: 0 14px 34px color-mix(in srgb, var(--primary) 25%, transparent);
    }

    .btn.good {
      border-color: transparent;
      color: #10281a;
      background: var(--good);
    }

    .btn.bad {
      border-color: transparent;
      color: #fff;
      background: color-mix(in srgb, var(--bad) 82%, #211a2f);
    }

    .btn.accent {
      border-color: transparent;
      color: #2d2140;
      background: var(--accent);
    }

    .btn.small {
      min-height: 34px;
      padding: 8px 11px;
      border-radius: 13px;
      font-size: 0.78rem;
    }

    .btn:disabled {
      opacity: 0.48;
      cursor: not-allowed;
      transform: none;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.055);
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 1000;
      line-height: 1.1;
      white-space: nowrap;
    }

    .pill.strong {
      color: var(--text);
      background: rgba(255, 255, 255, 0.09);
    }

    .main-stack {
      display: grid;
      gap: 15px;
      margin-top: 15px;
    }

    .panel {
      padding: 16px;
      border-radius: var(--radius-xl);
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-title h2,
    .section-title h3 {
      margin: 0;
      letter-spacing: -0.055em;
      line-height: 1.08;
    }

    .section-title h2 {
      font-size: 1.45rem;
    }

    .section-title p {
      margin: 5px 0 0;
      color: var(--muted);
      font-weight: 900;
      line-height: 1.45;
    }

    .mission-tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px;
      margin-top: 12px;
    }

    .mission-tab {
      min-height: 40px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.045);
      color: var(--muted);
      font-weight: 1000;
    }

    .mission-tab.active {
      border-color: transparent;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
    }

    .notice {
      min-height: 62px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 16px;
      border-radius: 20px;
      background: rgba(31, 26, 47, 0.74);
      box-shadow: none;
    }

    .notice.profile {
      border-color: color-mix(in srgb, var(--primary) 42%, transparent);
    }

    .notice.danger {
      border-color: color-mix(in srgb, var(--bad) 48%, transparent);
    }

    .notice.suggestion {
      border-color: color-mix(in srgb, var(--accent) 38%, transparent);
    }

    .notice.good {
      border-color: color-mix(in srgb, var(--good) 38%, transparent);
    }

    .notice .icon {
      width: 32px;
      flex: 0 0 32px;
      text-align: center;
      font-size: 1.32rem;
    }

    .notice strong {
      display: block;
      font-size: 1rem;
    }

    .notice p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 900;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 14px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat {
      padding: 15px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--card);
    }

    .stat strong {
      display: block;
      font-size: 1.42rem;
      letter-spacing: -0.06em;
    }

    .stat span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.81rem;
      font-weight: 1000;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .mission-card {
      display: grid;
      gap: 11px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card);
    }

    .mission-main {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
    }

    .mission-title {
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .mission-title strong {
      font-size: 1.05rem;
      line-height: 1.12;
      letter-spacing: -0.03em;
      word-break: break-word;
    }

    .mission-title small {
      color: var(--muted);
      font-weight: 850;
      line-height: 1.35;
    }

    .mission-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
      flex: 0 0 auto;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 7px;
    }

    .done-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 1000;
    }

    .mini-avatar {
      width: 25px;
      height: 25px;
      display: inline-grid;
      place-items: center;
      border-radius: 9px;
      color: white;
      background: var(--c, var(--primary));
      font-size: 0.86rem;
    }

    .empty {
      min-height: 43px;
      display: grid;
      place-items: center;
      padding: 13px;
      border: 1px dashed var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.025);
      color: var(--muted);
      font-weight: 1000;
      text-align: center;
    }

    .week-board {
      display: grid;
      grid-template-columns: repeat(7, minmax(122px, 1fr));
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      scroll-snap-type: x proximity;
    }

    .week-day {
      min-height: 255px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.035);
      scroll-snap-align: start;
    }

    .week-day h3 {
      margin: 0 0 10px;
      font-size: 0.98rem;
      letter-spacing: -0.03em;
    }

    .week-list {
      display: grid;
      gap: 8px;
    }

    .week-mini {
      display: grid;
      gap: 7px;
      min-height: 128px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
    }

    .week-mini strong {
      font-size: 0.9rem;
      line-height: 1.08;
      word-break: break-word;
    }

    .member-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .member-card {
      display: flex;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card);
    }

    .avatar {
      width: 48px;
      height: 48px;
      flex: 0 0 48px;
      display: grid;
      place-items: center;
      border-radius: 17px;
      color: white;
      background: var(--c, var(--primary));
      font-size: 1.35rem;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.18);
    }

    .member-card strong {
      display: block;
      font-size: 1.05rem;
    }

    .member-card span {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 1000;
    }

    .progress {
      height: 11px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .progress span {
      display: block;
      width: var(--w, 0%);
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--primary), var(--primary-2));
    }

    .achievement-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .ach-tab {
      min-height: 34px;
      padding: 8px 12px;
      border-radius: 13px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.055);
      color: var(--text);
      font-size: 0.82rem;
      font-weight: 1000;
    }

    .ach-tab.active {
      border-color: transparent;
      color: #2d2140;
      background: var(--accent);
    }

    .achievement-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .achievement {
      min-height: 96px;
      display: grid;
      place-items: center;
      gap: 8px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.035);
      text-align: center;
      font-weight: 1000;
    }

    .achievement .big {
      font-size: 1.55rem;
      opacity: 0.55;
      filter: grayscale(1);
    }

    .achievement.unlocked {
      border-color: color-mix(in srgb, var(--primary) 40%, transparent);
      background: rgba(255, 255, 255, 0.06);
    }

    .achievement.unlocked .big {
      opacity: 1;
      filter: none;
    }

    .history-list {
      display: grid;
      gap: 10px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 13px;
      border: 1px solid var(--border);
      border-radius: 17px;
      background: rgba(255, 255, 255, 0.045);
      font-weight: 1000;
    }

    .history-item span {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: max(16px, env(safe-area-inset-bottom));
      z-index: 50;
      width: min(680px, calc(100% - 24px));
      min-height: var(--nav-h);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: rgba(25, 21, 38, 0.88);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(20px);
      transform: translateX(-50%);
    }

    .nav-btn {
      display: grid;
      place-items: center;
      gap: 4px;
      padding: 8px 6px;
      border-radius: 16px;
      background: transparent;
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 1000;
    }

    .nav-btn.active {
      color: #fff;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
    }

    .nav-btn .nav-icon {
      font-size: 1rem;
      line-height: 1;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 1000;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      padding: 12px 13px;
      border: 1px solid var(--border);
      border-radius: 15px;
      outline: none;
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
    }

    .field textarea {
      min-height: 92px;
      resize: vertical;
    }

    .field input[type="color"] {
      min-height: 46px;
      padding: 5px;
    }

    .form-grid {
      display: grid;
      gap: 12px;
    }

    .form-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .day-checks {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 7px;
    }

    .day-checks label {
      min-height: 38px;
      display: grid;
      place-items: center;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
      font-weight: 1000;
      cursor: pointer;
    }

    .day-checks input {
      display: none;
    }

    .day-checks label:has(input:checked) {
      border-color: transparent;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(9, 8, 14, 0.68);
      backdrop-filter: blur(14px);
    }

    .modal {
      width: min(680px, 100%);
      max-height: min(86vh, 850px);
      overflow: auto;
      padding: 18px;
      border-radius: 24px;
      background: #201a31;
    }

    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .modal-head h2 {
      margin: 0;
      letter-spacing: -0.055em;
    }

    .modal-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-weight: 900;
      line-height: 1.4;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: calc(var(--nav-h) + 34px);
      z-index: 120;
      width: min(380px, calc(100% - 36px));
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: rgba(25, 21, 38, 0.94);
      box-shadow: var(--shadow);
      color: #fff;
      font-weight: 1000;
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
      transition: 0.22s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 880px) {
      .top-card {
        align-items: flex-start;
        flex-direction: column;
      }

      .top-actions {
        width: 100%;
        justify-content: stretch;
      }

      .top-actions .btn {
        flex: 1;
      }

      .grid-2,
      .grid-3,
      .member-grid {
        grid-template-columns: 1fr;
      }

      .achievement-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .week-board {
        grid-template-columns: repeat(7, minmax(76vw, 1fr));
      }

      .week-day {
        min-width: 76vw;
      }
    }

    @media (max-width: 560px) {
      body {
        padding-bottom: calc(var(--nav-h) + 28px + env(safe-area-inset-bottom));
      }

      .shell {
        width: min(100% - 20px, var(--max));
      }

      .app {
        padding-top: 12px;
      }

      .stats,
      .form-2 {
        grid-template-columns: 1fr;
      }

      .mission-tabs {
        grid-template-columns: repeat(2, 1fr);
      }

      .top-actions {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
      }

      .achievement-grid {
        grid-template-columns: 1fr;
      }

      .bottom-nav {
        width: calc(100% - 18px);
        border-radius: 20px;
      }

      .nav-btn {
        font-size: 0.68rem;
      }

      .day-checks {
        grid-template-columns: repeat(4, 1fr);
      }

      .mission-main {
        flex-direction: column;
      }

      .mission-actions {
        width: 100%;
        flex-direction: row;
        align-items: stretch;
      }

      .mission-actions .btn {
        flex: 1;
      }
    }
  </style>
</head>

<body>
  <div id="app" class="app shell"></div>
  <nav id="bottomNav" class="bottom-nav"></nav>
  <div id="modalRoot" hidden></div>
  <div id="toast" class="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signInAnonymously
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import {
      doc,
      getFirestore,
      onSnapshot,
      runTransaction,
      setDoc
    } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD-pG1xZyQoLqBYrizu3jYlrMtSkO9yZr0",
      authDomain: "casinha-4d078.firebaseapp.com",
      projectId: "casinha-4d078",
      storageBucket: "casinha-4d078.firebasestorage.app",
      messagingSenderId: "120575493435",
      appId: "1:120575493435:web:e355019986f48e79f5631e"
    };

    const COLLECTION = "familyBases";

    const STORAGE = {
      uid: "baseFamilia.uid",
      profile: "baseFamilia.profile",
      room: "baseFamilia.roomId",
      localData: "baseFamilia.localData"
    };

    const DAY_NAMES = ["Domingo", "Segunda", "Terça", "Quarta", "Quinta", "Sexta", "Sábado"];
    const DAY_SHORT = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];
    const WEEK_ORDER = [1, 2, 3, 4, 5, 6, 0];

    function escapeHTML(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function clamp(value, min, max) {
      const number = Number(value);
      if (Number.isNaN(number)) return min;
      return Math.max(min, Math.min(max, number));
    }

    function money(value) {
      return Number(value || 0).toLocaleString("pt-BR", {
        style: "currency",
        currency: "BRL"
      });
    }

    function todayKey(offset = 0) {
      const date = new Date();
      date.setDate(date.getDate() + offset);
      date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
      return date.toISOString().slice(0, 10);
    }

    function dateKey(date) {
      const copy = new Date(date);
      copy.setMinutes(copy.getMinutes() - copy.getTimezoneOffset());
      return copy.toISOString().slice(0, 10);
    }

    function fromKey(key) {
      const [year, month, day] = String(key).split("-").map(Number);
      return new Date(year, month - 1, day, 12);
    }

    function formatDate(key) {
      return fromKey(key).toLocaleDateString("pt-BR", {
        weekday: "short",
        day: "2-digit",
        month: "2-digit"
      });
    }

    function formatLongDate(key) {
      return fromKey(key).toLocaleDateString("pt-BR", {
        weekday: "long",
        day: "2-digit",
        month: "2-digit"
      });
    }

    function startOfWeekMonday() {
      const now = new Date();
      const day = now.getDay();
      const diff = day === 0 ? -6 : 1 - day;
      now.setDate(now.getDate() + diff);
      now.setHours(12, 0, 0, 0);
      return now;
    }

      }
      return code;

    function ensureDataShape(input) {
      const fallback = defaultData(input?.roomId || state.roomId || "LOCAL");

      const data = {

          ...(input?.settings || {})

    async function updateData(mutator) {
      if (state.cloudReady && state.roomId) {
        const ref = doc(state.db, COLLECTION, state.roomId);

        await runTransaction(state.db, async (transaction) => {
          const snapshot = await transaction.get(ref);
          const current = ensureDataShape(snapshot.exists() ? snapshot.data() : defaultData(state.roomId));

          mutator(current);
          current.updatedAt = Date.now();

          transaction.set(ref, current);
        });

        return;
      }

      mutator(state.data);
      state.data.updatedAt = Date.now();
      saveLocalData();
      applyTheme();
      render();
    }

    async function initFirebase() {
      renderLoading();

      state.app = initializeApp(firebaseConfig);
      state.auth = getAuth(state.app);
      state.db = getFirestore(state.app);

      onAuthStateChanged(state.auth, async (user) => {
        if (!user) return;

        state.uid = user.uid;
        state.signedIn = true;
        localStorage.setItem(STORAGE.uid, user.uid);

        const urlRoom = new URLSearchParams(location.search).get("room");
        const cleanUrlRoom = normalizeRoomCode(urlRoom);

        if (cleanUrlRoom) {
          await joinRoom(cleanUrlRoom, true);
          return;
        }

        const savedRoom = normalizeRoomCode(localStorage.getItem(STORAGE.room));

        if (savedRoom) {
          state.roomId = savedRoom;
          subscribeRoom(savedRoom);
          return;
        }

        await createRoom(true);
      });

      await signInAnonymously(state.auth);
    }

    function normalizeRoomCode(value) {
      return String(value || "").toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 6);
    }

    async function createRoom(silent = false) {
      const roomId = randomRoomCode();
      const profile = {
        ...getProfile(),
        uid: state.uid,
        joinedAt: Date.now()
      };

      const data = defaultData(roomId);
      data.members = {
        [state.uid]: profile
      };

      await setDoc(doc(state.db, COLLECTION, roomId), data);

      state.roomId = roomId;
      state.cloudReady = true;
      localStorage.setItem(STORAGE.room, roomId);
      subscribeRoom(roomId);

      if (!silent) {
        toast(`Sala ${roomId} criada.`);
      }
    }

    async function joinRoom(roomId, silent = false) {
      const code = normalizeRoomCode(roomId);

      if (code.length !== 6) {
        toast("Código inválido.");
        return;
      }

      const profile = {
        ...getProfile(),
        uid: state.uid,
        joinedAt: Date.now()
      };

      await setDoc(doc(state.db, COLLECTION, code), {
        roomId: code,
        members: {
          [state.uid]: profile
        },
        updatedAt: Date.now()
      }, { merge: true });

      state.roomId = code;
      state.cloudReady = true;
      localStorage.setItem(STORAGE.room, code);
      subscribeRoom(code);

      if (!silent) {
        toast(`Entrou na sala ${code}.`);
      }
    }

    function subscribeRoom(roomId) {
      if (state.unsubscribe) {
        state.unsubscribe();
      }

      state.cloudReady = true;
      state.roomId = roomId;

      state.unsubscribe = onSnapshot(
        doc(state.db, COLLECTION, roomId),
        (snapshot) => {
          if (!snapshot.exists()) {
            toast("Sala não encontrada. Criando uma nova base local.");
            state.cloudReady = false;
            localStorage.removeItem(STORAGE.room);
            loadLocalData();
            return;
          }

          state.data = ensureDataShape(snapshot.data());
          applyTheme();
          render();
        },
        (error) => {
          console.error(error);
          toast("Erro ao sincronizar. Confira as Rules do Firestore.");
          loadLocalData();
        }
      );
    }

    function members() {
      return Object.values(state.data?.members || {});
    }

    function me() {
      return state.data?.members?.[state.uid] || getProfile();
    }

    function missionStartKey(mission) {
      return dateKey(new Date(mission.createdAt || Date.now()));
    }

    function isDueOn(mission, key) {
      if (key < missionStartKey(mission)) return false;

      const date = fromKey(key);
      const day = date.getDay();

      if (mission.frequency === "daily") return true;
      if (mission.frequency === "weekly") return (mission.days || []).map(Number).includes(day);
      if (mission.frequency === "monthly") return date.getDate() === Number(mission.monthDay || 1);
      return mission.date === key;
    }

    function doneMap(mission, key) {
      return mission.done?.[key] || {};
    }

    function doneByMe(mission, key = todayKey()) {
      return Boolean(doneMap(mission, key)[state.uid]);
    }

    function doneMembers(mission, key = todayKey()) {
      const map = doneMap(mission, key);
      return members().filter((person) => map[person.uid]);
    }

    function baseComplete(mission, key = todayKey()) {
      const map = doneMap(mission, key);

      if (mission.assigned === "both" && members().length > 1) {
        return members().every((person) => Boolean(map[person.uid]));
      }

      return Object.values(map).some(Boolean);
    }

    function dueDatesForMission(mission, back = 45, forward = 0) {
      const dates = [];

      for (let offset = -back; offset <= forward; offset += 1) {
        const key = todayKey(offset);

        if (isDueOn(mission, key)) {
          dates.push(key);
        }
      }

      return dates;
    }

    function missionsDueToday() {
      return state.data.missions.filter((mission) => isDueOn(mission, todayKey()));
    }

    function missionsByFrequency(frequency) {
      return state.data.missions.filter((mission) => mission.frequency === frequency);
    }

    function overdueItems() {
      const items = [];

      for (const mission of state.data.missions) {
        for (const key of dueDatesForMission(mission, 45, -1)) {
          if (!baseComplete(mission, key)) {
            items.push({ mission, key });
          }
        }
      }

      return items.sort((a, b) => a.key.localeCompare(b.key));
    }

    function nextMission() {
      const today = todayKey();
      const pendingToday = missionsDueToday().find((mission) => !baseComplete(mission, today));

      if (pendingToday) {
        return { mission: pendingToday, key: today };
      }

      for (let offset = 1; offset <= 31; offset += 1) {
        const key = todayKey(offset);
        const found = state.data.missions.find((mission) => isDueOn(mission, key));

        if (found) {
          return { mission: found, key };
        }
      }

      return null;
    }

    function completedEvents() {
      const events = [];

      for (const mission of state.data.missions) {
        for (const [key, map] of Object.entries(mission.done || {})) {
          for (const [uid, value] of Object.entries(map || {})) {
            if (value) {
              events.push({
                type: "mission",
                mission,
                key,
                uid,
                at: typeof value === "number" ? value : Date.now()
              });
            }
          }
        }
      }

      return events;
    }

    function scoreFor(uid) {
      return completedEvents()
        .filter((event) => event.uid === uid)
        .reduce((sum, event) => sum + Number(event.mission.xp || 0), 0);
    }

    function categoryDoneCount(category) {
      return completedEvents().filter((event) => event.mission.category === category).length;
    }

    function minutesDone() {
      return completedEvents().reduce((sum, event) => sum + Number(event.mission.minutes || 0), 0);
    }

    function walletSaved() {
      return (state.data.wallet.goals || []).reduce((sum, goal) => sum + Number(goal.saved || 0), 0);
    }

    function walletTarget() {
      return (state.data.wallet.goals || []).reduce((sum, goal) => sum + Number(goal.target || 0), 0);
    }

    function perfectDayCount() {
      let count = 0;

      for (let offset = 0; offset >= -120; offset -= 1) {
        const key = todayKey(offset);
        const due = state.data.missions.filter((mission) => isDueOn(mission, key));

        if (due.length && due.every((mission) => baseComplete(mission, key))) {
          count += 1;
        }
      }

      return count;
    }

    function currentStreak() {
      let streak = 0;

      for (let offset = 0; offset >= -90; offset -= 1) {
        const key = todayKey(offset);
        const due = state.data.missions.filter((mission) => isDueOn(mission, key));

        if (!due.length || !due.every((mission) => baseComplete(mission, key))) {
          break;
        }

        streak += 1;
      }

      return streak;
    }

    function metrics() {
      const events = completedEvents();

      return {
        missionsDone: events.length,
        perfectDays: perfectDayCount(),
        petsDone: categoryDoneCount("pets"),
        casaDone: categoryDoneCount("casa"),
        financeiroDone: categoryDoneCount("financeiro"),
        relacionamentoDone: categoryDoneCount("relacionamento"),
        saudeDone: categoryDoneCount("saude"),
        minutesDone: minutesDone(),
        moneySaved: walletSaved()
      };
    }

    function unlockedCount() {
      const m = metrics();
      return ACHIEVEMENTS.filter((achievement) => m[achievement[4]] >= achievement[3]).length;
    }

    function dayPerfectRemaining() {
      return missionsDueToday().filter((mission) => !baseComplete(mission, todayKey())).length;
    }

    function systemHealth(category) {
      if (category === "pets") return state.data.systems.pets.health || 0;
      if (category === "casa") return state.data.systems.casa.health || 0;
      return 0;

            <button class="btn small" data-action="open-theme">☀️ Tema</button>
          </div>
        </header>

        <main id="page" class="main-stack"></main>
      `;
    }

    function renderPage() {
      const page = document.getElementById("page");

      if (state.page === "missoes") page.innerHTML = renderMissionsPage();
      if (state.page === "base") page.innerHTML = renderBasePage();
      if (state.page === "cofrinho") page.innerHTML = renderWalletPage();
      if (state.page === "hall") page.innerHTML = renderHallPage();
      if (state.page === "historico") page.innerHTML = renderHistoryPage();
    }

    function renderBottomNav() {
      const items = [
        ["missoes", "⚡", "Missões"],
        ["base", "📊", "Base"],
        ["cofrinho", "🐷", "Cofrinho"],
        ["hall", "🏆", "Hall"],
        ["historico", "🧾", "Histórico"]
      ];

      navEl.innerHTML = items.map(([page, icon, label]) => `
        <button class="nav-btn ${state.page === page ? "active" : ""}" data-page="${page}" type="button">
          <span class="nav-icon">${icon}</span>
          <span>${label}</span>
        </button>
      `).join("");
    }

    function renderMissionsPage() {
      return `
        <section class="panel">
          <div class="section-title">
            <div>
              <h2>Missões</h2>
            </div>
            <span class="pill strong">${escapeHTML(formatLongDate(todayKey()))}</span>
          </div>

          <div class="mission-tabs">
            ${renderMissionTab("base", "Base")}
            ${renderMissionTab("daily", "Diárias")}
            ${renderMissionTab("weekly", "Semanais")}
            ${renderMissionTab("monthly", "Mensais")}
          </div>
        </section>

        ${renderNotices()}

        ${state.missionTab === "base" ? renderMissionBaseTab() : ""}
        ${state.missionTab === "daily" ? renderMissionFrequencyTab("daily", "Diárias", "+ Nova diária") : ""}
        ${state.missionTab === "weekly" ? renderWeeklyTab() : ""}
        ${state.missionTab === "monthly" ? renderMissionFrequencyTab("monthly", "Mensais", "+ Nova mensal") : ""}
      `;
    }

    function renderMissionTab(tab, label) {
      return `
        <button class="mission-tab ${state.missionTab === tab ? "active" : ""}" data-mission-tab="${tab}" type="button">
          ${label}
        </button>
      `;
    }

    function renderNotices() {
      const overdue = overdueItems();
      const next = nextMission();
      const remaining = dayPerfectRemaining();

      return `
        <article class="notice profile">
          <div class="icon">👤</div>
          <div>
            <strong>Perfil ativo: ${escapeHTML(me().name)}</strong>
            <p>XP e provocações estão personalizados para este aparelho.</p>
          </div>
        </article>

        <article class="notice danger">
          <div class="icon">⚠️</div>
          <div>
            <strong>${overdue.length} atrasada(s)</strong>
            <p>Comece por: ${next ? escapeHTML(next.mission.title) : "uma missão pequena"}.</p>
          </div>
        </article>

        <article class="notice suggestion">
          <div class="icon">🧠</div>
          <div>
            <strong>Sugestão da Base</strong>
            <p>${next ? `${escapeHTML(next.mission.title)} • ${next.mission.minutes} min • ${next.mission.xp} XP.` : "Nenhuma missão pendente agora."}</p>
          </div>
        </article>

        <article class="notice danger">
          <div class="icon">🐾</div>
          <div>
            <strong>Pets precisa de atenção</strong>
            <p>Saúde do sistema em ${systemHealth("pets")}%. </p>
          </div>
        </article>

        <article class="notice danger">
          <div class="icon">🏠</div>
          <div>
            <strong>Casa precisa de atenção</strong>
            <p>Saúde do sistema em ${systemHealth("casa")}%. </p>
          </div>
        </article>
      `;
    }

    function renderMissionBaseTab() {
      const next = nextMission();
      const overdue = overdueItems();

      return `
        <section class="grid-2">
          <div class="panel">
            <div class="section-title">
              <div>
                <h2>Próxima</h2>
              </div>
            </div>
            ${next ? renderMissionCard(next.mission, next.key) : `<div class="empty">Nada pendente.</div>`}
          </div>

          <div class="panel">
            <div class="section-title">
              <div>
                <h2>Base hoje</h2>
              </div>
            </div>
            ${renderTodayStats()}
          </div>
        </section>

        <section class="panel">
          <div class="grid-3">
            ${renderCompactFrequency("daily", "☀️ Diária")}
            ${renderCompactFrequency("weekly", "📅 Semanal")}
            ${renderCompactFrequency("monthly", "🗓️ Mensal")}
          </div>
        </section>

        <section class="panel">
          <div class="section-title">
            <div>
              <h2>Atrasadas</h2>
            </div>
            <span class="pill strong">${overdue.length}</span>
          </div>

          <div class="list">
            ${overdue.slice(0, 14).map(({ mission, key }) => renderMissionCard(mission, key, true)).join("") || `<div class="empty">Nada atrasado.</div>`}
          </div>
        </section>
      `;
    }

    function renderTodayStats() {
      const due = missionsDueToday();
      const done = due.filter((mission) => baseComplete(mission, todayKey())).length;
      const percent = due.length ? Math.round((done / due.length) * 100) : 100;
      const perfect = due.length && done === due.length ? "⭐" : "—";

      return `
        <div class="stats">
          <div class="stat">
            <strong>${done}/${due.length}</strong>
            <span>feitas</span>
          </div>
          <div class="stat">
            <strong>${percent}%</strong>
            <span>progresso</span>
          </div>
          <div class="stat">
            <strong>${perfect}</strong>
            <span>dia perfeito</span>
          </div>
        </div>
      `;
    }

    function renderCompactFrequency(frequency, title) {
      const key = todayKey();
      const list = missionsByFrequency(frequency)
        .filter((mission) => frequency === "monthly" ? isDueOn(mission, key) : true)
        .slice(0, 2);

      return `
        <div>
          <p class="pill">${title}</p>
          <div style="height: 10px"></div>
          <div class="list">
            ${list.map((mission) => renderMissionCard(mission, nextKeyForMission(mission), true)).join("") || `<div class="empty">Nada pendente.</div>`}
          </div>
        </div>
      `;
    }

    function nextKeyForMission(mission) {
      for (let offset = 0; offset <= 40; offset += 1) {
        const key = todayKey(offset);
        if (isDueOn(mission, key)) return key;
      }

      return mission.date || todayKey();
    }

    function renderMissionFrequencyTab(frequency, title, buttonLabel) {
      const list = missionsByFrequency(frequency);
      const defaultAction = frequency === "daily" ? "open-daily-form" : frequency === "monthly" ? "open-monthly-form" : "open-mission-form";

      return `
        <section class="panel">
          <div class="section-title">
            <div>
              <h2>${title}</h2>
            </div>
            <button class="btn small primary" data-action="${defaultAction}" type="button">${buttonLabel}</button>
          </div>

          <div class="list">
            ${list.map((mission) => renderMissionCard(mission, nextKeyForMission(mission))).join("") || `<div class="empty">Nenhuma missão cadastrada.</div>`}
          </div>
        </section>
      `;
    }

    function renderWeeklyTab() {
      return `
        <section class="panel">
          <div class="section-title">
            <div>
              <h2>Semanais</h2>
            </div>
            <button class="btn small primary" data-action="open-weekly-form" type="button">+ Nova semanal</button>
          </div>

          ${renderWeekBoard()}
        </section>
      `;
    }

    function renderWeekBoard() {
      const start = startOfWeekMonday();

      const columns = WEEK_ORDER.map((dayIndex, orderIndex) => {
        const date = new Date(start);
        date.setDate(start.getDate() + orderIndex);
        const key = dateKey(date);
        const missions = state.data.missions.filter((mission) => mission.frequency === "weekly" && isDueOn(mission, key));

        return `
          <div class="week-day">
            <h3>${DAY_NAMES[dayIndex]}</h3>
            <div class="week-list">
              ${missions.length ? missions.map((mission) => renderWeekMiniCard(mission, key)).join("") : `<div class="empty">—</div>`}
            </div>
          </div>
        `;
      }).join("");

      return `<div class="week-board">${columns}</div>`;
    }

    function renderWeekMiniCard(mission, key) {
      const cat = categoryOf(mission.category);

      return `
        <article class="week-mini">
          <strong>${cat.icon}<br>${escapeHTML(mission.title)}</strong>
          <div class="badges">
            <span class="pill">${mission.minutes} min</span>
            <span class="pill">${mission.xp} XP</span>
            <span class="pill">${mission.energy} energia</span>
          </div>
          <button class="btn small good" data-action="toggle-done" data-id="${escapeHTML(mission.id)}" data-date="${escapeHTML(key)}" type="button">
            ${doneByMe(mission, key) ? "Feita" : "Fazer"}
          </button>
          <button class="btn small" data-action="edit-mission" data-id="${escapeHTML(mission.id)}" type="button">Editar</button>
        </article>
      `;
    }

    function renderMissionCard(mission, key = todayKey(), compact = false) {
      const cat = categoryOf(mission.category);
      const done = doneByMe(mission, key);
      const people = doneMembers(mission, key);
      const isOverdue = key < todayKey() && !baseComplete(mission, key);

      return `
        <article class="mission-card">
          <div class="mission-main">
            <div class="mission-title">
              <strong>${cat.icon} ${escapeHTML(mission.title)}</strong>
              <div class="badges">
                <span class="pill">${cat.icon} ${cat.label}</span>
                <span class="pill">${mission.assigned === "both" ? "Os dois fazem" : "Qualquer um pode fazer"}</span>
                <span class="pill">${mission.minutes} min</span>
                <span class="pill">${mission.xp} XP</span>
                <span class="pill">${mission.energy} energia</span>
                <span class="pill">${isOverdue ? "Atrasada" : formatDate(key)}</span>
              </div>
              ${!compact && mission.description ? `<small>${escapeHTML(mission.description)}</small>` : ""}
            </div>

            <div class="mission-actions">
              <button class="btn small good" data-action="toggle-done" data-id="${escapeHTML(mission.id)}" data-date="${escapeHTML(key)}" type="button">
                ${done ? "Feita" : "Feita"}
              </button>
              <button class="btn small" data-action="view-mission" data-id="${escapeHTML(mission.id)}" data-date="${escapeHTML(key)}" type="button">Ver</button>
              <button class="btn small" data-action="edit-mission" data-id="${escapeHTML(mission.id)}" type="button">Editar</button>
            </div>
          </div>

          <div class="done-row">
            ${people.length ? "Feita por:" : "Ainda não feita por ninguém."}
            ${people.map((person) => `
              <span class="mini-avatar" style="--c:${escapeHTML(person.color || "#b77aff")}">${escapeHTML(person.avatar || "👤")}</span>
            `).join("")}
          </div>
        </article>
      `;
    }

    function renderBasePage() {
      const m = metrics();
      const people = members();
      const maxScore = Math.max(1, ...people.map((person) => scoreFor(person.uid)));

      return `
        <section class="panel">
          <div class="section-title">
            <div>
              <h2>📊 Base</h2>
              <p>XP individual, moral da Base, rotina e competição saudável.</p>
            </div>
            <button class="btn small primary" data-action="open-mission-form" type="button">+ Missão</button>
          </div>

          <div class="stats">
            <div class="stat">
              <strong>${m.missionsDone}</strong>
              <span>missões feitas</span>
            </div>
            <div class="stat">
              <strong>${currentStreak()}</strong>
              <span>dias perfeitos em sequência</span>
            </div>
            <div class="stat">
              <strong>${unlockedCount()}</strong>
              <span>conquistas</span>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="section-title">
            <div>
              <h2>Dupla</h2>
              <p>Inspiração, não cobrança. Cada um pontua e a Base cresce junto.</p>
            </div>
          </div>

          <div class="member-grid">
            ${people.map((person) => {
              const xp = scoreFor(person.uid);
              return `
                <article class="member-card">
                  <div class="avatar" style="--c:${escapeHTML(person.color || "#b77aff")}">${escapeHTML(person.avatar || "👤")}</div>
                  <div style="width:100%">
                    <strong>${escapeHTML(person.name)} ${person.uid === state.uid ? "(você)" : ""}</strong>
                    <span>${xp} XP total</span>
                    <div style="height:8px"></div>
                    <div class="progress"><span style="--w:${Math.round((xp / maxScore) * 100)}%"></span></div>
                  </div>
                </article>
              `;
            }).join("")}

            ${people.length < 2 ? `<div class="empty">Compartilhe a sala para seu par entrar.</div>` : ""}
          </div>
        </section>

        <section class="grid-2">
          <div class="panel">
            <div class="section-title">
              <div>
                <h2>🐾 Pets</h2>
                <p>Saúde do sistema dos pets.</p>
              </div>
            </div>

            <div class="stat">
              <strong>${systemHealth("pets")}%</strong>
              <span>${escapeHTML(state.data.systems.pets.mood || "precisa de atenção")}</span>
            </div>

            <div style="height:12px"></div>
            <div class="progress"><span style="--w:${systemHealth("pets")}%"></span></div>
            <div style="height:12px"></div>

            <button class="btn good" data-action="care-system" data-system="pets" type="button">Cuidar dos pets</button>
          </div>

          <div class="panel">
            <div class="section-title">
              <div>
                <h2>🏠 Casa</h2>
                <p>Saúde do sistema da casa.</p>
              </div>
            </div>

            <div class="stat">
              <strong>${systemHealth("casa")}%</strong>
              <span>${escapeHTML(state.data.systems.casa.mood || "precisa de atenção")}</span>
            </div>

            <div style="height:12px"></div>
            <div class="progress"><span style="--w:${systemHealth("casa")}%"></span></div>
            <div style="height:12px"></div>

            <button class="btn good" data-action="care-system" data-system="casa" type="button">Arrumar a casa</button>
          </div>
        </section>
      `;
    }

    function renderWalletPage() {
      const goals = state.data.wallet.goals || [];
      const saved = walletSaved();
      const target = walletTarget();
      const remaining = Math.max(0, target - saved);

      return `
        <section class="panel">
          <div class="section-title">
            <div>
              <h2>🐷 Cofrinho</h2>
            </div>
            <button class="btn small primary" data-action="open-goal-form" type="button">+ Meta</button>
          </div>

          <div class="stats">
            <div class="stat">
              <strong>${money(saved)}</strong>
              <span>guardado</span>
            </div>
            <div class="stat">
              <strong>${money(remaining)}</strong>
              <span>faltando</span>
            </div>
            <div class="stat">
              <strong>${goals.length}</strong>
              <span>metas</span>
            </div>
          </div>

          <div style="height:12px"></div>

          <div class="list">
            ${goals.map(renderGoalCard).join("") || `<div class="empty">Nenhuma meta.</div>`}
          </div>
        </section>
      `;
    }

    function renderGoalCard(goal) {
      const percent = Math.min(100, Math.round((Number(goal.saved || 0) / Math.max(1, Number(goal.target || 1))) * 100));

      return `
        <article class="mission-card">
          <div class="mission-main">
            <div class="mission-title">
              <strong>🐷 ${escapeHTML(goal.title)}</strong>
              <div class="badges">
                <span class="pill">${money(goal.saved)} guardado</span>
                <span class="pill">${money(goal.target)} meta</span>
                <span class="pill">${percent}%</span>
              </div>
            </div>

            <div class="mission-actions">
              <button class="btn small good" data-action="open-deposit-form" data-id="${escapeHTML(goal.id)}" type="button">Depositar</button>
              <button class="btn small" data-action="edit-goal" data-id="${escapeHTML(goal.id)}" type="button">Editar</button>
            </div>
          </div>

          <div class="progress"><span style="--w:${percent}%"></span></div>
        </article>
      `;
    }

    function renderHallPage() {
      const m = metrics();
      const filters = [
        ["todas", "Todas"],
        ["pets", "Pets"],
        ["casa", "Casa"],
        ["financeiro", "Financeiro"],
        ["relacionamento", "Relacionamento"],
        ["saude", "Saúde"],
        ["perfeito", "Dia Perfeito"],
        ["tempo", "Tempo"],
        ["cofrinho", "Cofrinho"]
      ];

      const list = ACHIEVEMENTS.filter((achievement) => state.hallFilter === "todas" || achievement[0] === state.hallFilter);

      return `
        <section class="panel">
          <div class="section-title">
            <div>
              <h2>🏆 Hall</h2>
            </div>
            <span class="pill strong">${unlockedCount()} desbloqueadas</span>
          </div>

          <div class="achievement-tabs">
            ${filters.map(([key, label]) => `
              <button class="ach-tab ${state.hallFilter === key ? "active" : ""}" data-hall-filter="${key}" type="button">${label}</button>
            `).join("")}
          </div>

          <div class="achievement-grid">
            ${list.map(([category, icon, label, needed, metric]) => {
              const unlocked = m[metric] >= needed;
              return `
                <article class="achievement ${unlocked ? "unlocked" : ""}">
                  <div class="big">${unlocked ? icon.replace("🔒", "🏆") : "🔒"}</div>
                  <strong>${escapeHTML(label)}</strong>
                </article>
              `;
            }).join("")}
          </div>
        </section>
      `;
    }

    function renderHistoryPage() {
      const missionEvents = completedEvents().map((event) => {
        const person = state.data.members[event.uid] || { name: "Pessoa", avatar: "👤" };

        return {
          at: event.at,
          html: `
            <div class="history-item">
              <div>
                ${categoryOf(event.mission.category).icon} ${escapeHTML(event.mission.title)}
                <br>
                <span>${escapeHTML(person.avatar)} ${escapeHTML(person.name)} • ${formatDate(event.key)}</span>
              </div>
              <strong>+${event.mission.xp} XP</strong>
            </div>
          `
        };
      });

      const walletEvents = (state.data.wallet.deposits || []).map((deposit) => ({
        at: deposit.createdAt || Date.now(),
        html: `
          <div class="history-item">
            <div>
              🐷 ${escapeHTML(deposit.description || "Depósito")}
              <br>
              <span>${escapeHTML(deposit.byName || "Pessoa")} • ${formatDate(deposit.date || todayKey())}</span>
            </div>
            <strong>${money(deposit.amount)}</strong>
          </div>
        `
      }));

      const history = [...missionEvents, ...walletEvents]
        .sort((a, b) => b.at - a.at)
        .slice(0, 90);

      return `
        <section class="panel">
          <div class="section-title">
            <div>
              <h2>🧾 Histórico</h2>
              <p>Tudo que a Base já movimentou.</p>
            </div>
          </div>

          <div class="history-list">
            ${history.map((item) => item.html).join("") || `<div class="empty">Nada no histórico ainda.</div>`}
          </div>
        </section>
      `;
    }

      modalRoot.innerHTML = `
        <section class="modal">
          <div class="modal-head">
            <div>
              <h2>${title}</h2>
              ${subtitle ? `<p>${subtitle}</p>` : ""}
            </div>
            <button class="btn small" data-action="close-modal" type="button">✕</button>
          </div>
          ${body}
        </section>
      `;
    }

    function closeModal() {
      modalRoot.hidden = true;
      modalRoot.className = "";
      modalRoot.innerHTML = "";
    }

            <div class="field">
              <label>Secundária</label>
              <input name="primary2" type="color" value="#f47bca">
            </div>

            <div class="field">
              <label>Destaque</label>
              <input name="accent" type="color" value="#ffc247">
            </div>
          </div>

          <button class="btn primary" type="submit">Salvar tema personalizado</button>
        </form>
      `);
    }

    function openNoticesModal() {
      openModal("Avisos da Base", "Resumo rápido para agir sem culpa.", `
        <div class="history-list">
          <div class="history-item">
            <div>
              ⚠️ Atrasadas
              <br>
              <span>${overdueItems().length} item(ns). Comece por uma missão pequena.</span>
            </div>
          </div>

          <div class="history-item">
            <div>
              ⭐ Dia Perfeito
              <br>
              <span>${dayPerfectRemaining()} missão(ões) faltando hoje.</span>
            </div>
          </div>

          <div class="history-item">
            <div>
              🐾 Pets
              <br>
              <span>Saúde atual em ${systemHealth("pets")}%. </span>
            </div>
          </div>

          <div class="history-item">
            <div>
              🏠 Casa
              <br>
              <span>Saúde atual em ${systemHealth("casa")}%. </span>
            </div>
          </div>
        </div>
      `);
    }

    function openMissionForm(defaultFrequency = "daily", missionId = "") {
      const mission = state.data.missions.find((item) => item.id === missionId) || null;
      const frequency = mission?.frequency || defaultFrequency;
      const selectedDays = new Set(mission?.days?.length ? mission.days.map(Number) : [new Date().getDay()]);

      openModal(mission ? "Editar missão" : "Nova missão", "Missões pequenas, claras e possíveis funcionam melhor.", `
        <form id="missionForm" class="form-grid" data-id="${mission ? escapeHTML(mission.id) : ""}">
          <div class="field">
            <label>Título</label>
            <input name="title" maxlength="70" value="${escapeHTML(mission?.title || "")}" placeholder="Ex: LIXO NA RUA" required>
          </div>

          <div class="field">
            <label>Descrição</label>
            <textarea name="description" maxlength="260" placeholder="Detalhe rápido da missão">${escapeHTML(mission?.description || "")}</textarea>
          </div>

          <div class="form-2">
            <div class="field">
              <label>Categoria</label>
              <select name="category">
                ${Object.entries(CATEGORIES).map(([key, cat]) => `
                  <option value="${key}" ${mission?.category === key ? "selected" : ""}>${cat.icon} ${cat.label}</option>
                `).join("")}
              </select>
            </div>

            <div class="field">
              <label>Frequência</label>
              <select name="frequency">
                ${[
                  ["daily", "Diária"],
                  ["weekly", "Semanal"],
                  ["monthly", "Mensal"],
                  ["once", "Uma vez"]
                ].map(([key, label]) => `
                  <option value="${key}" ${frequency === key ? "selected" : ""}>${label}</option>
                `).join("")}
              </select>
            </div>
          </div>

          <div class="field">
            <label>Dias da semana, para missão semanal</label>
            <div class="day-checks">
              ${DAY_SHORT.map((day, index) => `
                <label>
                  <input type="checkbox" name="days" value="${index}" ${selectedDays.has(index) ? "checked" : ""}>
                  ${day}
                </label>
              `).join("")}
            </div>
          </div>

          <div class="form-2">
            <div class="field">
              <label>Data, para missão única</label>
              <input name="date" type="date" value="${escapeHTML(mission?.date || todayKey())}">
            </div>

            <div class="field">
              <label>Dia do mês, para mensal</label>
              <input name="monthDay" type="number" min="1" max="31" value="${escapeHTML(mission?.monthDay || new Date().getDate())}">
            </div>
          </div>

          <div class="field">
            <label>Quem faz?</label>
            <select name="assigned">
              <option value="any" ${mission?.assigned !== "both" ? "selected" : ""}>Qualquer um pode fazer</option>
              <option value="both" ${mission?.assigned === "both" ? "selected" : ""}>Os dois fazem</option>
            </select>
          </div>

          <div class="form-2">
            <div class="field">
              <label>Minutos</label>
              <input name="minutes" type="number" min="1" max="600" value="${escapeHTML(mission?.minutes || 5)}">
            </div>

            <div class="field">
              <label>XP</label>
              <input name="xp" type="number" min="1" max="200" value="${escapeHTML(mission?.xp || 10)}">
            </div>
          </div>

          <div class="field">
            <label>Energia</label>
            <input name="energy" type="number" min="1" max="5" value="${escapeHTML(mission?.energy || 1)}">
          </div>

          <button class="btn primary" type="submit">${mission ? "Salvar missão" : "Criar missão"}</button>
          ${mission ? `<button class="btn bad" type="button" data-action="delete-mission" data-id="${escapeHTML(mission.id)}">Excluir missão</button>` : ""}
        </form>
      `);
    }

    function openMissionView(missionId, key) {
      const mission = state.data.missions.find((item) => item.id === missionId);
      if (!mission) return;

      const cat = categoryOf(mission.category);
      const people = doneMembers(mission, key);

      openModal(`${cat.icon} ${escapeHTML(mission.title)}`, formatLongDate(key), `
        <div class="history-list">
          <div class="history-item">
            <div>
              Categoria
              <br>
              <span>${cat.icon} ${cat.label}</span>
            </div>
          </div>

          <div class="history-item">
            <div>
              Recompensa
              <br>
              <span>${mission.minutes} min • ${mission.xp} XP • ${mission.energy} energia</span>
            </div>
          </div>

          <div class="history-item">
            <div>
              Feita por
              <br>
              <span>${people.length ? people.map((p) => `${p.avatar} ${p.name}`).join(", ") : "ninguém ainda"}</span>
            </div>
          </div>

          <div class="history-item">
            <div>
              Descrição
              <br>
              <span>${escapeHTML(mission.description || "Sem descrição.")}</span>
            </div>
          </div>
        </div>

        <div style="height:14px"></div>

        <button class="btn good" data-action="toggle-done" data-id="${escapeHTML(mission.id)}" data-date="${escapeHTML(key)}" type="button">
          ${doneByMe(mission, key) ? "Desmarcar" : "Marcar como feita"}
        </button>
      `);
    }

    function openGoalForm(goalId = "") {
      const goal = state.data.wallet.goals.find((item) => item.id === goalId) || null;

      openModal(goal ? "Editar meta" : "Nova meta", "Cofrinho para planos, reservas, viagens e mimos.", `
        <form id="goalForm" class="form-grid" data-id="${goal ? escapeHTML(goal.id) : ""}">
          <div class="field">
            <label>Nome da meta</label>
            <input name="title" maxlength="70" value="${escapeHTML(goal?.title || "")}" placeholder="Ex: Viagem, reserva, jantar..." required>
          </div>

          <div class="form-2">
            <div class="field">
              <label>Valor da meta</label>
              <input name="target" type="number" min="1" step="0.01" value="${escapeHTML(goal?.target || 300)}" required>
            </div>

            <div class="field">
              <label>Já guardado</label>
              <input name="saved" type="number" min="0" step="0.01" value="${escapeHTML(goal?.saved || 0)}">
            </div>
          </div>

          <button class="btn primary" type="submit">${goal ? "Salvar meta" : "Criar meta"}</button>
          ${goal ? `<button class="btn bad" data-action="delete-goal" data-id="${escapeHTML(goal.id)}" type="button">Excluir meta</button>` : ""}
        </form>
      `);
    }

    function openDepositForm(goalId) {
      const goal = state.data.wallet.goals.find((item) => item.id === goalId);
      if (!goal) return;

      openModal("Depositar", `Meta: ${escapeHTML(goal.title)}`, `
        <form id="depositForm" class="form-grid" data-id="${escapeHTML(goal.id)}">
          <div class="field">
            <label>Valor</label>
            <input name="amount" type="number" min="0.01" step="0.01" placeholder="25.00" required>
          </div>

          <div class="field">
            <label>Descrição</label>
            <input name="description" maxlength="70" placeholder="Ex: economizei no lanche" required>
          </div>

          <button class="btn primary" type="submit">Adicionar ao cofrinho</button>
        </form>
      `);
    }

    async function toggleDone(missionId, key) {
      await updateData((data) => {
        const mission = data.missions.find((item) => item.id === missionId);
        if (!mission) return;

        mission.done ||= {};
        mission.done[key] ||= {};

        const wasDone = Boolean(mission.done[key][state.uid]);

        if (wasDone) {
          delete mission.done[key][state.uid];
        } else {
          mission.done[key][state.uid] = Date.now();

          data.history ||= [];
          data.history.push({
            type: "mission",
            missionId,
            title: mission.title,
            category: mission.category,
            uid: state.uid,
            byName: me().name,
            date: key,
            xp: mission.xp,
            createdAt: Date.now()
          });

          if (mission.category === "pets") {
            data.systems.pets.health = clamp((data.systems.pets.health || 0) + 12, 0, 100);
            data.systems.pets.mood = data.systems.pets.health >= 70 ? "feliz" : "melhorando";
            data.systems.pets.lastCare = Date.now();
          }

          if (mission.category === "casa") {
            data.systems.casa.health = clamp((data.systems.casa.health || 0) + 10, 0, 100);
            data.systems.casa.mood = data.systems.casa.health >= 70 ? "em ordem" : "melhorando";
            data.systems.casa.lastCare = Date.now();
          }
        }

        if (Object.keys(mission.done[key]).length === 0) {
          delete mission.done[key];
        }
      });

      closeModal();
      toast("Base atualizada.");
    }

    async function saveMission(form) {
      const formData = new FormData(form);
      const id = form.dataset.id;
      const days = formData.getAll("days").map(Number);

      const payload = {
        title: String(formData.get("title") || "").trim().slice(0, 70),
        description: String(formData.get("description") || "").trim().slice(0, 260),
        category: String(formData.get("category") || "casa"),
        frequency: String(formData.get("frequency") || "daily"),
        days: days.length ? days : [new Date().getDay()],
        monthDay: clamp(formData.get("monthDay"), 1, 31),
        date: String(formData.get("date") || todayKey()),
        assigned: String(formData.get("assigned") || "any"),
        minutes: clamp(formData.get("minutes"), 1, 600),
        xp: clamp(formData.get("xp"), 1, 200),
        energy: clamp(formData.get("energy"), 1, 5)
      };

      if (!payload.title) {
        toast("Dê um título para a missão.");
        return;
      }

      await updateData((data) => {
        if (id) {
          const mission = data.missions.find((item) => item.id === id);
          if (!mission) return;
          Object.assign(mission, payload);
        } else {
          data.missions.push(createMission(payload));
        }
      });

      closeModal();
      toast(id ? "Missão atualizada." : "Missão criada.");
    }

    async function deleteMission(id) {
      const ok = confirm("Excluir essa missão da Base?");
      if (!ok) return;

      await updateData((data) => {
        data.missions = data.missions.filter((mission) => mission.id !== id);
      });

      closeModal();
      toast("Missão excluída.");
    }

    async function saveProfileForm(form) {
      const formData = new FormData(form);

      const profile = {
        uid: state.uid,
        name: String(formData.get("name") || "Mu").trim().slice(0, 32),
        avatar: String(formData.get("avatar") || "👤").trim().slice(0, 4),
        color: String(formData.get("color") || "#b77aff")
      };

      const baseName = String(formData.get("baseName") || "Base da Família").trim().slice(0, 40);

      saveProfile(profile);

      await updateData((data) => {
        data.baseName = baseName;
        data.members ||= {};
        data.members[state.uid] = {
          ...(data.members[state.uid] || {}),
          ...profile,
          uid: state.uid,
          joinedAt: data.members[state.uid]?.joinedAt || Date.now()
        };
      });

      closeModal();
      toast("Perfil salvo.");
    }

    function hexToPanel(hex) {
      const clean = String(hex || "#1f1a2f").replace("#", "");
      const r = parseInt(clean.slice(0, 2), 16);
      const g = parseInt(clean.slice(2, 4), 16);
      const b = parseInt(clean.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, 0.94)`;
    }

    async function saveCustomTheme(form) {
      const formData = new FormData(form);

      await updateData((data) => {
        data.settings.theme = "custom";
        data.settings.custom = {
          name: "Personalizado",
          bg: String(formData.get("bg")),
          bg2: String(formData.get("bg2")),
          panel: hexToPanel(formData.get("panelColor")),
          primary: String(formData.get("primary")),
          primary2: String(formData.get("primary2")),
          accent: String(formData.get("accent")),
          text: "#f7efff"
        };
      });

      closeModal();
      toast("Tema salvo para a Base.");
    }

    async function setTheme(theme) {
      await updateData((data) => {
        data.settings.theme = theme;
        data.settings.custom = null;
      });

      closeModal();
      toast("Tema sincronizado.");
    }

    async function saveGoal(form) {
      const formData = new FormData(form);
      const id = form.dataset.id;
      const title = String(formData.get("title") || "").trim().slice(0, 70);
      const target = clamp(formData.get("target"), 1, 9999999);
      const saved = clamp(formData.get("saved"), 0, 9999999);

      if (!title) {
        toast("Dê um nome para a meta.");
        return;
      }

      await updateData((data) => {
        data.wallet.goals ||= [];

        if (id) {
          const goal = data.wallet.goals.find((item) => item.id === id);
          if (!goal) return;

          goal.title = title;
          goal.target = target;
          goal.saved = saved;
        } else {
          data.wallet.goals.push({
            id: makeId("goal"),
            title,
            target,
            saved,
            createdAt: Date.now(),
            createdBy: state.uid
          });
        }
      });

      closeModal();
      toast(id ? "Meta atualizada." : "Meta criada.");
    }

    async function deleteGoal(id) {
      const ok = confirm("Excluir essa meta?");
      if (!ok) return;

      await updateData((data) => {
        data.wallet.goals = (data.wallet.goals || []).filter((goal) => goal.id !== id);
        data.wallet.deposits = (data.wallet.deposits || []).filter((deposit) => deposit.goalId !== id);
      });

      closeModal();
      toast("Meta excluída.");
    }

    async function saveDeposit(form) {
      const goalId = form.dataset.id;
      const formData = new FormData(form);
      const amount = clamp(formData.get("amount"), 0.01, 9999999);
      const description = String(formData.get("description") || "Depósito").trim().slice(0, 70);

      await updateData((data) => {
        const goal = data.wallet.goals.find((item) => item.id === goalId);
        if (!goal) return;

        goal.saved = Number(goal.saved || 0) + amount;

        data.wallet.deposits ||= [];
        data.wallet.deposits.push({
          id: makeId("deposit"),
          goalId,
          amount,
          description,
          uid: state.uid,
          byName: me().name,
          date: todayKey(),
          createdAt: Date.now()
        });
      });

      closeModal();
      toast("Cofrinho atualizado.");
    }

    async function careSystem(system) {
      await updateData((data) => {
        if (!data.systems[system]) return;

        data.systems[system].health = clamp((data.systems[system].health || 0) + 15, 0, 100);
        data.systems[system].mood = data.systems[system].health >= 70 ? "em ordem" : "melhorando";
        data.systems[system].lastCare = Date.now();
      });

      toast(system === "pets" ? "Pets receberam atenção. 🐾" : "Casa recebeu atenção. 🏠");
    }

    async function copyRoom() {
      const url = `${location.origin}${location.pathname}?room=${state.roomId}`;

      try {
        await navigator.clipboard.writeText(url);
        toast("Convite copiado.");
      } catch {
        toast(`Código da sala: ${state.roomId}`);
      }
    }

    function toast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("show");

      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => {
        toastEl.classList.remove("show");
      }, 2800);
    }

    document.addEventListener("click", async (event) => {
      const pageBtn = event.target.closest("[data-page]");
      const tabBtn = event.target.closest("[data-mission-tab]");
      const hallBtn = event.target.closest("[data-hall-filter]");
      const actionBtn = event.target.closest("[data-action]");

      try {
        if (pageBtn) {
          state.page = pageBtn.dataset.page;
          render();
          return;
        }

        if (tabBtn) {
          state.missionTab = tabBtn.dataset.missionTab;
          render();
          return;
        }

        if (hallBtn) {
          state.hallFilter = hallBtn.dataset.hallFilter;
          render();
          return;
        }

        if (!actionBtn) return;

        const action = actionBtn.dataset.action;

        if (action === "close-modal") closeModal();
        if (action === "open-profile") openProfileModal();
        if (action === "open-theme") openThemeModal();
        if (action === "open-notices") openNoticesModal();

        if (action === "open-mission-form") openMissionForm("daily");
        if (action === "open-daily-form") openMissionForm("daily");
        if (action === "open-weekly-form") openMissionForm("weekly");
        if (action === "open-monthly-form") openMissionForm("monthly");

        if (action === "edit-mission") openMissionForm("daily", actionBtn.dataset.id);
        if (action === "view-mission") openMissionView(actionBtn.dataset.id, actionBtn.dataset.date);
        if (action === "toggle-done") await toggleDone(actionBtn.dataset.id, actionBtn.dataset.date);
        if (action === "delete-mission") await deleteMission(actionBtn.dataset.id);

        if (action === "set-theme") await setTheme(actionBtn.dataset.theme);
        if (action === "care-system") await careSystem(actionBtn.dataset.system);

        if (action === "open-goal-form") openGoalForm();
        if (action === "edit-goal") openGoalForm(actionBtn.dataset.id);
        if (action === "open-deposit-form") openDepositForm(actionBtn.dataset.id);
        if (action === "delete-goal") await deleteGoal(actionBtn.dataset.id);

        if (action === "copy-room") await copyRoom();

        if (action === "create-room") {
          await createRoom(false);
          closeModal();
        }

        if (action === "join-room") {
          const code = document.getElementById("joinCodeInput")?.value || "";
          await joinRoom(code, false);
          closeModal();
        }
      } catch (error) {
        console.error(error);
        toast(error.message || "Não foi possível concluir.");
      }
    });

    document.addEventListener("submit", async (event) => {
      event.preventDefault();

      try {
        const form = event.target;

        if (form.id === "profileForm") await saveProfileForm(form);
        if (form.id === "missionForm") await saveMission(form);
        if (form.id === "customThemeForm") await saveCustomTheme(form);
        if (form.id === "goalForm") await saveGoal(form);
        if (form.id === "depositForm") await saveDeposit(form);
      } catch (error) {
        console.error(error);
        toast(error.message || "Erro ao salvar.");
      }
    });

    initFirebase().catch((error) => {
      console.error(error);
      toast("Firebase falhou. Rodando em modo local.");
      loadLocalData();
    });
  </script>
</body>
</html>
